async function dbGet(key) {
  try {
    const { data } = await db.from('shift_briefings').select('value').eq('key', key).maybeSingle();
    return data ? JSON.parse(data.value) : null;
  } catch { return null; }
}
async function dbSet(key, value) {
  try {
    await db.from('shift_briefings').upsert({ key, value: JSON.stringify(value) }, { onConflict: 'key' });
  } catch(e) { console.error('dbSet', e); }
}
async function dbList(prefix) {
  try {
    const { data } = await db.from('shift_briefings').select('key').like('key', prefix + '%').order('key', { ascending: true });
    return data ? data.map(r => r.key) : [];
  } catch { return []; }
}
async function getStaffList() {
  try {
    const { data } = await db.from('shift_staff').select('name').order('name');
    return data ? data.map(r => r.name) : [];
  } catch { return []; }
}
async function addStaffDb(name) {
  try { await db.from('shift_staff').upsert({ name }, { onConflict: 'name' }); } catch {}
}
async function removeStaffDb(name) {
  try { await db.from('shift_staff').delete().eq('name', name); } catch {}

  const keys = await dbList('briefing:');
  // Map of issue id -> latest state (from newest briefing that contains it)
  const issueMap = {};
  const sorted = [...keys].sort((a,b) => b.localeCompare(a));
  for (const key of sorted) {
    const b = await dbGet(key);
    if (!b) continue;
    for (const issue of (b.issues || [])) {
      // Only record the FIRST (newest) occurrence of each issue id
      if (!(issue.id in issueMap)) {
        issueMap[issue.id] = { ...issue, carriedFrom: b.timestamp };
      }
    }
  }
  // Return only issues whose latest state is unresolved
  return Object.values(issueMap)
    .filter(i => i.resolved !== true)
    .map(i => ({ ...i, isCarried: true }));
}

function showLoading(show) {
  let el = document.getElementById('loadingOverlay');
  if (show && !el) {
    el = document.createElement('div');
    el.id = 'loadingOverlay';
    el.className = 'loading-overlay';
    el.innerHTML = '<div class="spinner"></div><div>Loading...</div>';
    document.body.appendChild(el);
  } else if (!show && el) {
    el.remove();
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ─── START BRIEFING ──────────────────────────────────────────────────────────
function startBriefing(shift) {
  state.shift = shift;
  state.step = 0;
  state.attendance = [];
  state.checklist = {};
  state.adhoc = '';
  state.issues = [];
  state.feedback = [];
  state.remarks = '';
  state.photos = [];
  state.showManage = false;
  state.motivLine = MOTIVATIONAL_LINES[Math.floor(Math.random() * MOTIVATIONAL_LINES.length)];
  state.closingMotiv = MOTIVATIONAL_LINES[Math.floor(Math.random() * MOTIVATIONAL_LINES.length)];
  state.view = 'briefing';
  renderBriefing();
}

// ─── BRIEFING RENDER ─────────────────────────────────────────────────────────
function renderBriefing() {
  const s = state.step;
  const total = STEP_LABELS.length;
  document.getElementById('progFill').style.width = Math.round((s / (total - 1)) * 100) + '%';
  const shiftColor = state.shift === 'Day' ? 'var(--p-orange)' : '#818CF8';
  document.getElementById('topTitle').textContent = STEP_LABELS[s] || 'Briefing';
  document.getElementById('topShiftBadge').innerHTML =
    `<span class="badge" style="background:${shiftColor}22;color:${shiftColor};border:1px solid ${shiftColor}44">${state.shift === 'Day' ? 'Day' : 'Night'} Shift</span>`;
  document.getElementById('stepPills').innerHTML = STEP_LABELS.map((l, i) =>
    `<div class="step-pill ${i===s?'active':i<s?'done':''}">${i<s?'&#10003; ':''}${l}</div>`).join('');
  document.getElementById('bottomNav').style.display = 'flex';
  document.getElementById('btnBack').disabled = s === 0;
  document.getElementById('btnBack').style.opacity = s === 0 ? '0.4' : '1';
  document.getElementById('btnNext').textContent = s === total - 1 ? 'Save Briefing' : 'Next';
  const c = document.getElementById('mainContent');
  if (s===0) c.innerHTML = renderAttendance();
  else if (s===1) c.innerHTML = renderWelcome();
  else if (s===2) c.innerHTML = renderChecklist();
  else if (s===3) c.innerHTML = renderAdhoc();
  else if (s===4) c.innerHTML = renderIssues();
  else if (s===5) c.innerHTML = renderFeedback();
  else if (s===6) c.innerHTML = renderClosing();
  else if (s===7) c.innerHTML = renderPhotos();
  else if (s===8) c.innerHTML = renderReview();
}

// ── STEP 0: Attendance ───────────────────────────────────────────────────────
function renderAttendance() {
  const manageHtml = state.showManage ? `
    <div class="manage-panel">

      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${state.staffList.map(n => `
          <div style="background:var(--p-btn-sec);border:1px solid var(--p-border);border-radius:6px;padding:5px 10px;font-size:0.8rem;color:var(--p-text2);display:flex;align-items:center;gap:8px">
            ${escHtml(n)}<span onclick="removeStaff(this)" data-name="${escHtml(n)}" style="color:var(--p-red);cursor:pointer;font-weight:700">x</span>
          </div>`).join('')}
        ${state.staffList.length === 0 ? '<span style="color:var(--p-text3);font-size:0.8rem">No staff yet.</span>' : ''}
      </div>
    </div>` : '';

  const staffRows = state.staffList.length === 0
    ? '<div class="empty-state">No staff added yet.<br>Click Manage Staff List to add staff.</div>'
    : state.staffList.map(name => {
        const present = state.attendance.includes(name);
        const initials = name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        return `<div class="staff-item ${present?'present':''}" onclick="toggleAttendance(this)" data-name="${escHtml(name)}">
          <div class="staff-av">${initials}</div>
          <div class="staff-name">${escHtml(name)}</div>
          <div class="chk-box ${present?'checked':''}"></div>
        </div>`;
      }).join('');

  return `
    <div class="section-hd">Attendance</div>
    <div class="section-sub">Tick staff who are present for this shift</div>
    <div class="flex mb-12" style="flex-wrap:wrap;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="toggleManage()">${state.showManage ? 'Close' : 'Manage Staff List'}</button>
      <span class="badge badge-green">${state.attendance.length} Present</span>
    </div>
    ${manageHtml}${staffRows}`;
}

function toggleAttendance(el) {
  const name = el.dataset.name;
  state.attendance.includes(name)
    ? state.attendance = state.attendance.filter(n => n !== name)
    : state.attendance.push(name);
  renderBriefing();
}
function toggleManage() { state.showManage = !state.showManage; renderBriefing(); }
async function addStaff() {
  const inp = document.getElementById('newStaffInput');
  const n = inp ? inp.value.trim() : '';
  if (n && !state.staffList.includes(n)) {
    state.staffList.push(n);
    await addStaffDb(n);
  }
  renderBriefing();
}
async function removeStaff(el) {
  const name = el.dataset.name;
  state.staffList = state.staffList.filter(n => n !== name);
  state.attendance = state.attendance.filter(n => n !== name);
  await removeStaffDb(name);
  renderBriefing();
}

// ── STEP 2: Checklist ────────────────────────────────────────────────────────
function renderChecklist() {
  const allSections = [...(state.shift === 'Day' ? MORNING_CHECKLIST : NIGHT_CHECKLIST), ...SA_CSA, ...GENERAL];
  const total = allSections.reduce((a, s) => a + s.items.length, 0);
  const done  = Object.values(state.checklist).filter(Boolean).length;
  const sections = allSections.map(sec => {
    const items = sec.items.map(item => {
      const key = sec.section + ':' + item;
      const checked = !!state.checklist[key];
      return `<div class="chk-item" onclick="toggleCheck(this)" data-key="${escHtml(key)}">
        <div class="chk-box ${checked ? 'checked' : ''}"></div>
        <div class="chk-label ${checked ? 'checked' : ''}">${escHtml(item)}</div>
      </div>`;
    }).join('');
    return `<div class="card"><div class="card-title">${escHtml(sec.section)}</div>${items}</div>`;
  }).join('');
  return `
    <div class="flex-between mb-12">
      <div><div class="section-hd">Briefing Checklist</div><div class="section-sub">Tick each item as you cover it</div></div>
      <span class="badge ${done === total ? 'badge-green' : 'badge-orange'}">${done}/${total}</span>
    </div>${sections}`;
}

function toggleCheck(el) {
  const key = el.dataset.key;
  state.checklist[key] = !state.checklist[key];
  renderBriefing();
}

// ── STEP 4: Issues ───────────────────────────────────────────────────────────
function renderIssues() {
  const carriedHtml = state.carriedIssues.map(issue => `
    <div class="issue-card carried">
      <div class="flex mb-8" style="gap:6px;flex-wrap:wrap">
        <span class="badge badge-red">Carried Forward</span>
        ${issue.carriedFrom ? `<span style="color:var(--p-text3);font-size:0.72rem">from ${new Date(issue.carriedFrom).toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'})}</span>` : ''}
      </div>
      <div class="issue-text">${escHtml(issue.text)}</div>
      <div class="flex mb-8" style="flex-wrap:wrap;gap:8px">
        <button class="btn btn-sm btn-success ${issue.resolved === true ? 'active' : ''}" onclick="updateCarried(${issue.id},'resolved',true)">Resolved</button>
        <button class="btn btn-sm btn-danger ${issue.resolved !== true ? 'active' : ''}" onclick="updateCarried(${issue.id},'resolved',false)">Not Resolved</button>
      </div>
      <textarea class="inp" rows="2" placeholder="Add update or notes..." oninput="updateCarried(${issue.id},'update',this.value)">${escHtml(issue.update || '')}</textarea>
    </div>`).join('');

  const issuesHtml = state.issues.map(issue => `
    <div class="issue-card">
      <div class="flex-between mb-8">
        <div class="issue-text" style="margin:0;flex:1">${escHtml(issue.text)}</div>
        <button onclick="removeIssue(${issue.id})" style="background:none;border:none;color:var(--p-red);cursor:pointer;font-size:1.1rem;padding:0;margin-left:10px">x</button>
      </div>
      <div class="flex mb-8" style="flex-wrap:wrap;gap:8px">
        <button class="btn btn-sm btn-success ${issue.resolved === true ? 'active' : ''}" onclick="updateIssue(${issue.id},'resolved',true)">Resolved</button>
        <button class="btn btn-sm btn-danger ${issue.resolved === false ? 'active' : ''}" onclick="updateIssue(${issue.id},'resolved',false)">Not Resolved</button>
      </div>
      <textarea class="inp" rows="2" placeholder="Add update or notes..." oninput="updateIssue(${issue.id},'update',this.value)">${escHtml(issue.update || '')}</textarea>
    </div>`).join('');

  const empty = (state.carriedIssues.length + state.issues.length === 0)
    ? '<div class="empty-state">No issues. Add one below or all carried issues are resolved.</div>' : '';

  return `
    <div class="section-hd">Issues Log</div>
    <div class="section-sub">Unresolved issues from past shifts appear automatically. Mark resolved to clear them.</div>
    <div class="flex mb-12">
      <input class="inp" id="newIssueInput" placeholder="Describe a new issue..." style="flex:1" onkeydown="if(event.key==='Enter')addIssue()">
      <button class="btn btn-primary btn-sm" onclick="addIssue()">+ Add</button>
    </div>
    ${carriedHtml}${issuesHtml}${empty}`;
}

function addIssue() {
  const inp = document.getElementById('newIssueInput');
  const t = inp ? inp.value.trim() : '';
  if (!t) return;
  state.issues.push({ id: Date.now(), text: t, resolved: null, update: '' });
  renderBriefing();
}
function removeIssue(id) { state.issues = state.issues.filter(i => i.id !== id); renderBriefing(); }
function updateIssue(id, field, val) {
  const i = state.issues.find(x => x.id === id);
  if (i) i[field] = val;
  if (field !== 'update') renderBriefing();
}
function updateCarried(id, field, val) {
  const i = state.carriedIssues.find(x => x.id === id);
  if (i) i[field] = val;
  if (field !== 'update') renderBriefing();
}

        </div>
        <div class="fb-comment">${escHtml(fb.comment)}</div>
      </div>`).join('')
    : '<div class="empty-state">No feedback added yet.</div>';
  return `
    <div class="section-hd">Attendee Feedback</div>
    <div class="section-sub">Collect feedback from staff who attended the briefing</div>
    <div class="card">
      <input class="inp mb-8" id="fbName" placeholder="Staff name (optional)">
      <textarea class="inp mb-8" id="fbComment" rows="3" placeholder="Feedback or comment..."></textarea>
      <button class="btn btn-primary btn-sm" onclick="addFeedback()">+ Add Feedback</button>

}
function addFeedback() {
  const name = (document.getElementById('fbName')?.value || '').trim() || 'Anonymous';
  const comment = (document.getElementById('fbComment')?.value || '').trim();
  if (!comment) return;
  state.feedback.push({ id: Date.now(), name, comment });

}
function removeFeedback(id) { state.feedback = state.feedback.filter(f => f.id !== id); renderBriefing(); }

      <div class="motiv-label"> Auto-generated Motivational Closing</div>
      <div class="motiv-text">"${escHtml(state.closingMotiv)}"</div>
    </div>
    <textarea class="inp" rows="5" placeholder="Add your personal closing remarks..."
      oninput="state.remarks=this.value">${escHtml(state.remarks)}</textarea>`;

// ── STEP 7: Photos ───────────────────────────────────────────────────────────
function renderPhotos() {
  const grid = state.photos.length
    ? `<div class="photo-grid">${state.photos.map(p => `
        <div class="photo-thumb">
          <img src="${p.src}" alt="">
          <button class="photo-del" onclick="removePhoto('${p.id}')">x</button>
        </div>`).join('')}</div>` : '';
  return `
    <div class="section-hd">Briefing Photos</div>
    <div class="section-sub">Upload photo proof of the briefing. No limit.</div>
    <div class="upload-zone" onclick="document.getElementById('photoInput').click()">
      <div class="upload-icon">&#x1F4F7;</div>
      <div style="color:var(--p-text2);font-size:0.88rem">Click to upload photos</div>
      <div style="color:var(--p-text3);font-size:0.78rem;margin-top:4px">JPG, PNG, HEIC supported</div>
    </div>${grid}`;
}
function handlePhotos(e) {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      state.photos.push({ id: String(Date.now() + Math.random()), src: ev.target.result, name: file.name });
      renderBriefing();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
function removePhoto(id) { state.photos = state.photos.filter(p => p.id !== id); renderBriefing(); }

// ── STEP 8: Review ───────────────────────────────────────────────────────────
function renderReview() {
  const allSections = [...(state.shift === 'Day' ? MORNING_CHECKLIST : NIGHT_CHECKLIST), ...SA_CSA, ...GENERAL];
  const totalChk = allSections.reduce((a, s) => a + s.items.length, 0);
  const doneChk  = Object.values(state.checklist).filter(Boolean).length;
  const allIssues = [...state.carriedIssues, ...state.issues];
  const unresolved = allIssues.filter(i => i.resolved !== true).length;
  const rows = [
    { l:'Shift', v: state.shift + ' Shift' },
    { l:'Date & Time', v: new Date().toLocaleString('en-MY', { weekday:'short', day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) },
    { l:'Staff Present', v: state.attendance.length ? state.attendance.join(', ') : 'None' },
    { l:'Checklist Items Ticked', v: `${doneChk} / ${totalChk} items` },
    { l:'Issues', v: `${allIssues.length} total (${unresolved} unresolved)` },
    { l:'Feedback Entries', v: state.feedback.length },
    { l:'Photos', v: state.photos.length + ' uploaded' },
  ].map(r => `<div class="review-row"><span class="review-lbl">${r.l}</span><span class="review-val">${escHtml(String(r.v))}</span></div>`).join('');
  const remarkPreview = state.remarks
    ? `<div style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:var(--radius-sm);padding:12px 14px;margin-top:14px;color:#C7D2FE;font-size:0.85rem;font-style:italic">"${escHtml(state.remarks)}"</div>` : '';
  return `
    <div class="section-hd">Review & Submit</div>
    <div class="section-sub">Summary before saving this briefing</div>
    <div class="card">${rows}${remarkPreview}</div>
    <div style="color:var(--p-text3);font-size:0.8rem;text-align:center;margin-top:8px">
      Tap Save to store this briefing. Unresolved issues will appear in the next shift automatically.
    </div>`;
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function nextStep() {
  if (state.step < STEP_LABELS.length - 1) {
    state.step++;
    renderBriefing();
    window.scrollTo(0, 0);
  } else {
    saveBriefing();
  }
}
function prevStep() {
  if (state.step > 0) { state.step--; renderBriefing(); window.scrollTo(0, 0); }
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
async function saveBriefing() {
  showLoading(true);
  const ts = Date.now();
  const data = {
    timestamp: ts, shift: state.shift,
    attendance: [...state.attendance],
    checklist: { ...state.checklist },
    adhoc: state.adhoc,
    issues: [
      ...state.carriedIssues.map(i => ({ ...i, isCarried: true })),
      ...state.issues
    ],
    feedback: [...state.feedback],
    remarks: state.remarks,
    photos: state.photos.map(p => ({ id: p.id, src: p.src, name: p.name }))
  };
  await dbSet('briefing:' + ts, data);
  state.carriedIssues = await loadAllUnresolvedIssues();
  showLoading(false);
  showToast('Briefing saved successfully!');
  setTimeout(() => renderDashboard(), 900);
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
async function renderDashboard() {
  state.view = 'dashboard';
  document.getElementById('topTitle').textContent = 'All Briefings';
  document.getElementById('topShiftBadge').innerHTML = '';
  document.getElementById('stepPills').innerHTML = '';
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('bottomNav').style.display = 'none';
  document.getElementById('mainContent').innerHTML = '<div class="empty-state">Loading briefings...</div>';

  const keys = await dbList('briefing:');
  const briefings = (await Promise.all(keys.map(k => dbGet(k)))).filter(Boolean).sort((a, b) => b.timestamp - a.timestamp);
  const filtered = dbFilter === 'All' ? briefings : briefings.filter(b => b.shift === dbFilter);

  const filterBtns = ['All', 'Day', 'Night'].map(f => {
    const active = dbFilter === f;
    const label = f === 'Day' ? 'Day Shift' : f === 'Night' ? 'Night Shift' : 'All';
    return `<button class="btn btn-sm ${active ? 'btn-primary' : 'btn-ghost'}" onclick="setDbFilter('${f}')">${label}</button>`;
  }).join('');

  const cards = filtered.length === 0
    ? '<div class="empty-state">No briefings found.</div>'
    : filtered.map(b => {
        const allIssues = b.issues || [];
        const unresolved = allIssues.filter(i => i.resolved !== true).length;
        const shiftColor = b.shift === 'Day' ? 'var(--p-orange)' : '#818CF8';
        const date = new Date(b.timestamp).toLocaleDateString('en-MY', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
        const time = new Date(b.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        const id = 'db' + b.timestamp;

        // Build ticked checklist grouped by section
        const allSections = [...(b.shift === 'Day' ? MORNING_CHECKLIST : NIGHT_CHECKLIST), ...SA_CSA, ...GENERAL];
        const totalChk = allSections.reduce((a, s) => a + s.items.length, 0);
        const doneChk  = Object.values(b.checklist || {}).filter(Boolean).length;
        const tickedSections = allSections.map(sec => {
          const ticked = sec.items.filter(item => b.checklist && b.checklist[sec.section + ':' + item]);
          return ticked.length ? { section: sec.section, ticked, total: sec.items.length } : null;
        }).filter(Boolean);

        const checklistHtml = tickedSections.map(sec => `
          <div style="margin-bottom:10px">
            <div style="font-size:0.72rem;font-weight:700;color:var(--p-amber);margin-bottom:5px">${escHtml(sec.section)} (${sec.ticked.length}/${sec.total})</div>
            ${sec.ticked.map(item => `
              <div class="chk-done-item">
                <div style="color:var(--p-green);font-weight:700;flex-shrink:0">&#10003;</div>
                <div>${escHtml(item)}</div>
              </div>`).join('')}
          </div>`).join('');

        return `<div class="db-card">
          <div class="db-card-hdr" onclick="toggleDbCard('${id}')">
            <div>
              <div class="flex mb-8" style="flex-wrap:wrap;gap:6px">
                <span class="badge" style="background:${shiftColor}22;color:${shiftColor}">${escHtml(b.shift)} Shift</span>
                ${unresolved ? `<span class="badge badge-red">${unresolved} unresolved</span>` : ''}
                <span class="badge badge-blue">${doneChk}/${totalChk} checklist</span>
              </div>
              <div style="font-weight:700;font-size:0.95rem;color:var(--p-text)">${date}</div>
              <div style="color:var(--p-text3);font-size:0.8rem">${time} · ${(b.attendance||[]).length} staff · ${(b.photos||[]).length} photos</div>
            </div>
            <span style="color:var(--p-text3)" id="chev-${id}">&#x25BC;</span>
          </div>
          <div class="db-card-body" id="${id}">
            ${(b.attendance||[]).length ? `
              <div class="db-sub-title">Attendance</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
                ${b.attendance.map(n => `<span class="badge badge-green">${escHtml(n)}</span>`).join('')}
              </div>` : ''}
            ${b.adhoc ? `
              <div class="db-sub-title">Ad-hoc Notes</div>
              <div style="color:var(--p-text2);font-size:0.83rem;line-height:1.6;margin-bottom:10px">${escHtml(b.adhoc)}</div>` : ''}
            <div class="db-sub-title" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-top:12px" onclick="toggleChkSection('chk-${id}','chkchev-${id}')">
              <span>Checklist Covered (${doneChk}/${totalChk})</span>
              <span id="chkchev-${id}" style="font-size:0.7rem;color:var(--p-text3);background:var(--p-btn-sec);border:1px solid var(--p-border);border-radius:4px;padding:2px 8px">Show &#x25BC;</span>
            </div>
            <div id="chk-${id}" style="display:none;margin-bottom:10px">
              ${tickedSections.length ? checklistHtml : '<div style="color:var(--p-text3);font-size:0.8rem;padding:8px 0">No items ticked in this briefing.</div>'}
            </div>
            ${allIssues.length ? `
              <div class="db-sub-title">Issues (${allIssues.length})</div>
              ${allIssues.map(i => `
                <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--p-border);gap:8px">
                  <div>
                    <div style="font-size:0.83rem;color:var(--p-text)">${escHtml(i.text)}</div>
                    ${i.update ? `<div style="font-size:0.75rem;color:var(--p-text3);margin-top:2px">Update: ${escHtml(i.update)}</div>` : ''}
                    ${i.isCarried ? `<div style="font-size:0.72rem;color:var(--p-orange);margin-top:2px">Carried forward</div>` : ''}
                  </div>
                  <span class="badge ${i.resolved === true ? 'badge-green' : 'badge-red'}">${i.resolved === true ? 'Resolved' : 'Unresolved'}</span>
                </div>`).join('')}` : ''}
            ${(b.feedback||[]).length ? `
              <div class="db-sub-title">Feedback</div>
              ${b.feedback.map(f => `
                <div style="padding:5px 0;border-bottom:1px solid var(--p-border)">
                  <span style="color:var(--p-amber);font-size:0.78rem;font-weight:700">${escHtml(f.name)}: </span>
                  <span style="color:var(--p-text2);font-size:0.83rem">${escHtml(f.comment)}</span>
                </div>`).join('')}` : ''}
            ${b.remarks ? `
              <div class="db-sub-title">Closing Remarks</div>
              <div style="color:#C7D2FE;font-size:0.85rem;font-style:italic;margin-bottom:10px">"${escHtml(b.remarks)}"</div>` : ''}
            ${(b.photos||[]).length ? `
              <div class="db-sub-title">Photos (${b.photos.length})</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:6px">
                ${b.photos.map(p => `<img src="${p.src}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px">`).join('')}
              </div>` : ''}
          </div>
        </div>`;
      }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="flex-between mb-12">
      <div>
        <div class="section-hd">Dashboard</div>
        <div style="color:var(--p-text3);font-size:0.82rem">${briefings.length} briefings recorded</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="renderHome()">+ New Briefing</button>
    </div>
    <div class="flex mb-12">${filterBtns}</div>
    ${cards}`;
}

function toggleDbCard(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (chev) chev.innerHTML = body.classList.contains('open') ? '&#x25B2;' : '&#x25BC;';
}
function setDbFilter(f) { dbFilter = f; renderDashboard(); }
function toggleChkSection(bodyId, chevId) {
  const body = document.getElementById(bodyId);
  const chev = document.getElementById(chevId);
  if (!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (chev) chev.innerHTML = isOpen ? 'Show &#x25BC;' : 'Hide &#x25B2;';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── BOOT ────────────────────────────────────────────────────────────────────
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
<script src="sidebar.js"></script>
</body>
</html>
