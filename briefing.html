<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shift Briefing – Petron Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --p-bg:       #0B0F1A;
      --p-card:     #121826;
      --p-border:   #1F2A44;
      --p-header:   #0F1B3D;
      --p-blue:     #3B82F6;
      --p-blue-lt:  #60A5FA;
      --p-green:    #22C55E;
      --p-amber:    #F59E0B;
      --p-red:      #FF4D4F;
      --p-red-dk:   #DC2626;
      --p-orange:   #F97316;
      --p-indigo:   #6366F1;
      --p-text:     #E6EDF7;
      --p-text2:    #94A3B8;
      --p-text3:    #64748B;
      --p-btn-sec:  #1F2A44;
      --p-btn-sech: #2A3A5F;
      --font: 'IBM Plex Sans', sans-serif;
      --mono: 'IBM Plex Mono', monospace;
      --radius: 12px;
      --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--p-bg); color: var(--p-text); font-family: var(--font); min-height: 100vh; }

    /* ── Topbar ── */
    .topbar {
      background: var(--p-header);
      border-bottom: 1px solid var(--p-border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-title { font-size: 1.1rem; font-weight: 800; font-family: 'Syne', sans-serif; flex: 1; text-align: center; }
    .topbar a { color: var(--p-text2); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .topbar a:hover { color: var(--p-text); }

    /* ── Progress bar ── */
    .prog-wrap { background: var(--p-border); height: 4px; width: 100%; }
    .prog-fill { height: 4px; background: linear-gradient(90deg, var(--p-orange), var(--p-amber)); transition: width 0.4s ease; }

    /* ── Step pills ── */
    .step-pills { display: flex; gap: 6px; overflow-x: auto; padding: 14px 16px 0; scrollbar-width: none; }
    .step-pills::-webkit-scrollbar { display: none; }
    .step-pill {
      flex-shrink: 0; padding: 4px 12px; border-radius: 99px; font-size: 0.72rem; font-weight: 600;
      border: 1px solid var(--p-border); color: var(--p-text3); background: var(--p-card); cursor: default;
    }
    .step-pill.active { border-color: var(--p-orange); color: var(--p-orange); background: rgba(249,115,22,0.08); }
    .step-pill.done { border-color: rgba(34,197,94,0.3); color: var(--p-green); background: rgba(34,197,94,0.08); }

    /* ── Content ── */
    .content { max-width: 520px; margin: 0 auto; padding: 20px 16px 100px; }

    /* ── Card ── */
    .card {
      background: var(--p-card);
      border: 1px solid var(--p-border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
    }
    .card-title { font-size: 0.78rem; font-weight: 700; color: var(--p-amber); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }

    /* ── Section heading ── */
    .section-hd { font-size: 1.1rem; font-weight: 800; color: var(--p-text); margin-bottom: 4px; }
    .section-sub { font-size: 0.82rem; color: var(--p-text3); margin-bottom: 18px; }

    /* ── Shift select buttons ── */
    .shift-btns { display: flex; gap: 14px; justify-content: center; margin-top: 12px; }
    .shift-btn {
      flex: 1; max-width: 180px; border: none; border-radius: var(--radius); padding: 28px 16px;
      cursor: pointer; font-family: var(--font); font-weight: 800; font-size: 1rem;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .shift-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .shift-btn.day  { background: linear-gradient(135deg, var(--p-orange), var(--p-amber)); color: #0B0F1A; }
    .shift-btn.night{ background: linear-gradient(135deg, var(--p-indigo), #818CF8); color: #fff; }
    .shift-btn .shift-em { font-size: 2.2rem; }
    .shift-btn .shift-sub { font-size: 0.72rem; font-weight: 600; opacity: 0.75; }

    /* ── Carried issues banner ── */
    .carried-banner {
      background: rgba(255,77,79,0.08);
      border: 1px solid rgba(255,77,79,0.25);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 18px;
    }
    .carried-banner-title { color: var(--p-red); font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; }
    .carried-banner-item { color: var(--p-text3); font-size: 0.8rem; margin-bottom: 3px; }

    /* ── Checklist item ── */
    .chk-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--p-border); cursor: pointer;
    }
    .chk-item:last-child { border-bottom: none; }
    .chk-box {
      width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0; margin-top: 1px;
      border: 2px solid var(--p-border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .chk-box.checked { background: var(--p-green); border-color: var(--p-green); }
    .chk-box.checked::after { content: '✓'; color: #0B0F1A; font-size: 12px; font-weight: 900; }
    .chk-label { font-size: 0.85rem; line-height: 1.5; color: var(--p-text2); transition: all 0.15s; }
    .chk-label.checked { color: var(--p-text3); text-decoration: line-through; }

    /* ── Staff attendance ── */
    .staff-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--p-border); background: var(--p-card);
      cursor: pointer; margin-bottom: 8px; transition: all 0.15s;
    }
    .staff-item.present { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }
    .staff-av {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--p-btn-sec); display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }
    .staff-item.present .staff-av { background: rgba(34,197,94,0.2); color: var(--p-green); }
    .staff-name { flex: 1; font-size: 0.9rem; font-weight: 600; }

    /* ── Inputs ── */
    .inp {
      width: 100%; background: var(--p-btn-sec); border: 1px solid var(--p-border);
      border-radius: var(--radius-sm); color: var(--p-text); padding: 10px 13px;
      font-size: 0.88rem; font-family: var(--font); outline: none; transition: border-color 0.15s;
    }
    .inp:focus { border-color: var(--p-blue); }
    textarea.inp { resize: vertical; min-height: 100px; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 10px; }
    .btn {
      border: none; border-radius: var(--radius-sm); padding: 10px 20px;
      font-family: var(--font); font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--p-orange), var(--p-amber)); color: #0B0F1A; }
    .btn-ghost { background: var(--p-btn-sec); color: var(--p-text2); border: 1px solid var(--p-border); }
    .btn-ghost:hover { background: var(--p-btn-sech); color: var(--p-text); }
    .btn-sm { padding: 6px 13px; font-size: 0.78rem; }
    .btn-danger { background: rgba(255,77,79,0.12); color: var(--p-red); border: 1px solid rgba(255,77,79,0.25); }
    .btn-success { background: rgba(34,197,94,0.12); color: var(--p-green); border: 1px solid rgba(34,197,94,0.25); }
    .btn-success.active { background: rgba(34,197,94,0.25); }
    .btn-danger.active  { background: rgba(255,77,79,0.25); }

    /* ── Badge ── */
    .badge {
      font-size: 0.7rem; font-weight: 700; padding: 2px 9px; border-radius: 99px;
      font-family: var(--mono); letter-spacing: 0.4px;
    }
    .badge-orange { background: rgba(249,115,22,0.15); color: var(--p-orange); }
    .badge-green  { background: rgba(34,197,94,0.15);  color: var(--p-green); }
    .badge-red    { background: rgba(255,77,79,0.15);  color: var(--p-red); }
    .badge-blue   { background: rgba(59,130,246,0.15); color: var(--p-blue); }
    .badge-indigo { background: rgba(99,102,241,0.15); color: #818CF8; }

    /* ── Issue card ── */
    .issue-card { background: var(--p-card); border: 1px solid var(--p-border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; }
    .issue-card.carried { border-color: rgba(249,115,22,0.3); }
    .issue-text { font-size: 0.88rem; color: var(--p-text); line-height: 1.5; margin-bottom: 10px; }
    .issue-update { font-size: 0.78rem; color: var(--p-text3); margin-top: 6px; }

    /* ── Feedback card ── */
    .fb-card { background: var(--p-card); border: 1px solid var(--p-border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
    .fb-name { font-size: 0.78rem; font-weight: 700; color: var(--p-amber); margin-bottom: 4px; }
    .fb-comment { font-size: 0.85rem; color: var(--p-text2); line-height: 1.5; }

    /* ── Welcome box ── */
    .welcome-box {
      background: linear-gradient(135deg, rgba(249,115,22,0.08), rgba(251,191,36,0.08));
      border: 1px solid rgba(249,115,22,0.2);
      border-radius: var(--radius); padding: 20px; margin-bottom: 16px; text-align: center;
    }
    .welcome-emoji { font-size: 3.5rem; margin-bottom: 10px; }
    .welcome-title { font-size: 1.4rem; font-weight: 800; font-family: 'Syne', sans-serif; margin-bottom: 10px; }
    .motiv-box {
      background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2);
      border-radius: var(--radius-sm); padding: 14px; margin-bottom: 14px;
    }
    .motiv-label { font-size: 0.72rem; font-weight: 700; color: #818CF8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px; }
    .motiv-text  { font-size: 0.95rem; color: #C7D2FE; font-style: italic; line-height: 1.6; }

    /* ── Photo grid ── */
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 14px; }
    .photo-thumb { position: relative; aspect-ratio: 1; border-radius: var(--radius-sm); overflow: hidden; background: var(--p-btn-sec); }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-del {
      position: absolute; top: 5px; right: 5px;
      background: rgba(11,15,26,0.7); border: none; border-radius: 50%;
      width: 22px; height: 22px; color: var(--p-red); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .upload-zone {
      border: 2px dashed var(--p-border); border-radius: var(--radius);
      padding: 30px 16px; text-align: center; cursor: pointer; transition: border-color 0.15s;
    }
    .upload-zone:hover { border-color: var(--p-orange); }
    .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }

    /* ── Review summary row ── */
    .review-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--p-border); font-size: 0.88rem;
    }
    .review-row:last-child { border-bottom: none; }
    .review-lbl { color: var(--p-text3); }
    .review-val { color: var(--p-text); font-weight: 600; text-align: right; max-width: 55%; }

    /* ── Dashboard ── */
    .db-card { background: var(--p-card); border: 1px solid var(--p-border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; cursor: pointer; }
    .db-card-hdr { display: flex; justify-content: space-between; align-items: flex-start; }
    .db-card-body { margin-top: 14px; border-top: 1px solid var(--p-border); padding-top: 14px; display: none; }
    .db-card-body.open { display: block; }
    .db-sub-title { font-size: 0.7rem; font-weight: 700; color: var(--p-text3); text-transform: uppercase; letter-spacing: 0.8px; margin: 10px 0 6px; }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(11,15,26,0.92); backdrop-filter: blur(12px);
      border-top: 1px solid var(--p-border);
      padding: 12px 20px; display: flex; justify-content: space-between; gap: 10px;
      max-width: 520px; margin: 0 auto;
    }

    /* ── Manage staff panel ── */
    .manage-panel { background: var(--p-card); border: 1px solid var(--p-border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 14px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--p-green); color: #0B0F1A; padding: 10px 20px;
      border-radius: 99px; font-size: 0.85rem; font-weight: 700;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── Utility ── */
    .flex { display: flex; align-items: center; gap: 8px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mb-8  { margin-bottom: 8px; }
    .mb-12 { margin-bottom: 12px; }
    .empty-state { color: var(--p-text3); font-size: 0.85rem; text-align: center; padding: 24px 0; }
    input[type="file"] { display: none; }

    @media (max-width: 540px) {
      .shift-btns { flex-direction: column; align-items: center; }
      .shift-btn { max-width: 100%; width: 100%; flex-direction: row; padding: 18px 20px; }
    }
  </style>
</head>

function lsGet(key) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
function lsList(prefix) {

  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(prefix)) keys.push(k);
  }
  return keys.sort();
}

// ─── INIT ────────────────────────────────────────────────────────────────────

function init() {
  state.staffList = lsGet('staff-list') || [];
  // Load carried issues from last briefing
  const keys = lsList('briefing:');
  if (keys.length) {
    const last = lsGet(keys[keys.length - 1]);
    if (last) {
      state.carriedIssues = (last.issues || [])
        .filter(i => i.resolved === false)
        .map(i => ({ ...i, isCarried: true, carriedFrom: last.timestamp }));
    }
  }
  renderHome();
}

// ─── RENDER ROUTER ───────────────────────────────────────────────────────────

function render() {
  if (state.view === 'home')      return renderHome();
  if (state.view === 'briefing')  return renderBriefing();
  if (state.view === 'dashboard') return renderDashboard();
}

// ─── HOME ────────────────────────────────────────────────────────────────────

function renderHome() {
  state.view = 'home';
  document.getElementById('topTitle').textContent = 'Shift Briefing';
  document.getElementById('topShiftBadge').innerHTML = '';
  document.getElementById('stepPills').innerHTML = '';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('bottomNav').style.display = 'none';

  let carriedHtml = '';
  if (state.carriedIssues.length) {
    const items = state.carriedIssues.slice(0,3).map(i => `<div class="carried-banner-item">• ${i.text}</div>`).join('');
    const more = state.carriedIssues.length > 3 ? `<div class="carried-banner-item" style="color:var(--p-text3)">+${state.carriedIssues.length-3} more…</div>` : '';
    carriedHtml = `<div class="carried-banner">
      <div class="carried-banner-title">⚠️ ${state.carriedIssues.length} Unresolved Issue(s) Carried Forward</div>
      ${items}${more}
    </div>`;
  }

  document.getElementById('mainContent').innerHTML = `
    <div style="text-align:center;padding-top:16px">
      <div style="font-size:3rem;margin-bottom:10px">⛽</div>
      <div style="font-size:1.6rem;font-weight:800;font-family:'Syne',sans-serif;margin-bottom:4px">Shift Briefing</div>
      <div style="color:var(--p-text3);font-size:0.85rem;margin-bottom:28px">Petron Task Management System</div>
      ${carriedHtml}
      <div style="color:var(--p-text3);font-size:0.82rem;margin-bottom:14px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px">Select Shift</div>
      <div class="shift-btns">
        <button class="shift-btn day" onclick="startBriefing('Day')">
          <span class="shift-em">☀️</span>
          <div><div>Day Shift</div><div class="shift-sub">Syif Pagi</div></div>
        </button>
        <button class="shift-btn night" onclick="startBriefing('Night')">
          <span class="shift-em">🌙</span>
          <div><div>Night Shift</div><div class="shift-sub">Syif Malam</div></div>
        </button>
      </div>
      <div style="margin-top:24px">
        <button class="btn btn-ghost" onclick="renderDashboard()" style="width:100%">📊 View All Briefings</button>
      </div>
    </div>
  `;
}

// ─── START BRIEFING ──────────────────────────────────────────────────────────

function startBriefing(shift) {
  state.shift = shift;
  state.step = 0;
  state.attendance = [];
  state.checklist = {};
  state.adhoc = '';
  state.issues = [];
  state.feedback = [];
  state.remarks = '';
  state.photos = [];
  state.showManage = false;
  state.motivLine = MOTIVATIONAL_LINES[Math.floor(Math.random() * MOTIVATIONAL_LINES.length)];
  state.closingMotiv = MOTIVATIONAL_LINES[Math.floor(Math.random() * MOTIVATIONAL_LINES.length)];
  state.view = 'briefing';
  renderBriefing();
}

// ─── BRIEFING RENDER ─────────────────────────────────────────────────────────

function renderBriefing() {
  const s = state.step;
  const total = STEP_LABELS.length;
  const pct = Math.round((s / (total - 1)) * 100);
  document.getElementById('progFill').style.width = pct + '%';

  // Topbar
  const shiftColor = state.shift === 'Day' ? 'var(--p-orange)' : '#818CF8';
  document.getElementById('topTitle').textContent = STEP_LABELS[s] || 'Briefing';
  document.getElementById('topShiftBadge').innerHTML =
    `<span class="badge" style="background:${shiftColor}22;color:${shiftColor};border:1px solid ${shiftColor}44">
      ${state.shift === 'Day' ? '☀️' : '🌙'} ${state.shift}
    </span>`;

  // Pills
  document.getElementById('stepPills').innerHTML = STEP_LABELS.map((l, i) =>
    `<div class="step-pill ${i===s?'active':i<s?'done':''}">${i<s?'✓ ':''} ${l}</div>`
  ).join('');

  // Nav
  document.getElementById('bottomNav').style.display = 'flex';
  document.getElementById('btnBack').disabled = s === 0;
  document.getElementById('btnBack').style.opacity = s === 0 ? '0.4' : '1';
  document.getElementById('btnNext').textContent = s === total - 1 ? '💾 Save' : 'Next →';

  // Steps
  const c = document.getElementById('mainContent');
  if (s === 0) c.innerHTML = renderAttendance();
  else if (s === 1) c.innerHTML = renderWelcome();
  else if (s === 2) c.innerHTML = renderChecklist();
  else if (s === 3) c.innerHTML = renderAdhoc();
  else if (s === 4) c.innerHTML = renderIssues();
  else if (s === 5) c.innerHTML = renderFeedback();
  else if (s === 6) c.innerHTML = renderClosing();
  else if (s === 7) c.innerHTML = renderPhotos();
  else if (s === 8) c.innerHTML = renderReview();
}

// ── STEP 0: Attendance ──────────────────────────────────────────────────────

function renderAttendance() {
  const presentCount = state.attendance.length;
  const manageHtml = state.showManage ? `
    <div class="manage-panel">
      <div style="color:var(--p-text2);font-size:0.82rem;font-weight:600;margin-bottom:10px">Add / Remove Staff</div>
      <div class="flex mb-12">
        <input class="inp" id="newStaffInput" placeholder="Staff name…" style="flex:1" onkeydown="if(event.key==='Enter')addStaff()">
        <button class="btn btn-primary btn-sm" onclick="addStaff()">+ Add</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${state.staffList.map(n => `
          <div style="background:var(--p-btn-sec);border:1px solid var(--p-border);border-radius:6px;padding:5px 10px;font-size:0.8rem;color:var(--p-text2);display:flex;align-items:center;gap:8px">
            ${n}
            <span onclick="removeStaff('${n.replace(/'/g,"\\'")}'); " style="color:var(--p-red);cursor:pointer;font-weight:700">×</span>
          </div>
        `).join('')}
        ${state.staffList.length === 0 ? '<span style="color:var(--p-text3);font-size:0.8rem">No staff yet.</span>' : ''}
      </div>
    </div>
  ` : '';

  const staffRows = state.staffList.length === 0
    ? '<div class="empty-state">No staff added yet.<br>Click "Manage Staff List" to add staff.</div>'
    : state.staffList.map(name => {
        const present = state.attendance.includes(name);
        const initials = name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
        return `<div class="staff-item ${present?'present':''}" onclick="toggleAttendance('${name.replace(/'/g,"\\'")}')">
          <div class="staff-av">${initials}</div>
          <div class="staff-name">${name}</div>
          <div class="chk-box ${present?'checked':''}"></div>
        </div>`;
      }).join('');

  return `
    <div class="section-hd">👥 Attendance</div>
    <div class="section-sub">Tick staff who are present for this shift</div>
    <div class="flex mb-12" style="flex-wrap:wrap;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="toggleManage()">${state.showManage ? '✕ Close' : '⚙️ Manage Staff List'}</button>
      <span class="badge badge-green">${presentCount} Present</span>
    </div>
    ${manageHtml}
    ${staffRows}
  `;
}

function toggleAttendance(name) {
  if (state.attendance.includes(name)) {
    state.attendance = state.attendance.filter(n => n !== name);
  } else {
    state.attendance.push(name);
  }
  renderBriefing();
}
function toggleManage() { state.showManage = !state.showManage; renderBriefing(); }
function addStaff() {
  const inp = document.getElementById('newStaffInput');
  const n = inp ? inp.value.trim() : '';
  if (n && !state.staffList.includes(n)) {
    state.staffList.push(n);
    lsSet('staff-list', state.staffList);
  }
  renderBriefing();
}
function removeStaff(name) {
  state.staffList = state.staffList.filter(n => n !== name);
  state.attendance = state.attendance.filter(n => n !== name);
  lsSet('staff-list', state.staffList);
  renderBriefing();
}

// ── STEP 1: Welcome ─────────────────────────────────────────────────────────

function renderWelcome() {
  const greeting = state.shift === 'Day' ? 'Selamat Pagi' : 'Selamat Malam';
  const badges = state.attendance.length
    ? state.attendance.map(n => `<span class="badge badge-orange" style="margin:3px">${n}</span>`).join('')
    : '<span style="color:var(--p-text3);font-size:0.82rem">No staff ticked</span>';
  return `
    <div class="welcome-box">
      <div class="welcome-emoji">${state.shift === 'Day' ? '☀️' : '🌙'}</div>
      <div class="welcome-title">${greeting}, Team!</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:12px">${badges}</div>
    </div>
    <div class="motiv-box">
      <div class="motiv-label">💬 Kata-kata Semangat</div>
      <div class="motiv-text">"${state.motivLine}"</div>
    </div>
    <div class="card">
      <div style="color:var(--p-text2);font-size:0.85rem;line-height:1.8">
        Hari ini adalah peluang baru untuk memberikan yang terbaik.<br>
        Mari kita mulakan syif ini dengan semangat, keselamatan, dan layanan cemerlang.<br>
        <strong style="color:var(--p-amber)">Kita boleh! 💪</strong>
      </div>
    </div>
  `;
}

// ── STEP 2: Checklist ────────────────────────────────────────────────────────

function renderChecklist() {
  const allSections = [...(state.shift === 'Day' ? MORNING_CHECKLIST : NIGHT_CHECKLIST), ...SA_CSA, ...GENERAL];
  const total = allSections.reduce((a, s) => a + s.items.length, 0);
  const done  = Object.values(state.checklist).filter(Boolean).length;

  const sections = allSections.map(sec => {
    const items = sec.items.map(item => {
      const key = sec.section + ':' + item;
      const checked = !!state.checklist[key];
      return `<div class="chk-item" onclick="toggleCheck('${encodeURIComponent(key)}')">
        <div class="chk-box ${checked?'checked':''}"></div>
        <div class="chk-label ${checked?'checked':''}">${item}</div>
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="card-title">${sec.icon} ${sec.section}</div>
      ${items}
    </div>`;
  }).join('');

  return `
    <div class="flex-between mb-12">
      <div><div class="section-hd">📋 Briefing Checklist</div><div class="section-sub">Tick each item as you cover it</div></div>
      <span class="badge ${done===total?'badge-green':'badge-orange'}">${done}/${total}</span>
    </div>
    ${sections}
  `;
}

function toggleCheck(encodedKey) {
  const key = decodeURIComponent(encodedKey);
  state.checklist[key] = !state.checklist[key];
  // Update only the clicked item for performance
  const allSections = [...(state.shift === 'Day' ? MORNING_CHECKLIST : NIGHT_CHECKLIST), ...SA_CSA, ...GENERAL];
  const total = allSections.reduce((a, s) => a + s.items.length, 0);
  const done  = Object.values(state.checklist).filter(Boolean).length;
  // Re-render is fine for this
  renderBriefing();
}

// ── STEP 3: Adhoc ────────────────────────────────────────────────────────────

function renderAdhoc() {
  return `
    <div class="section-hd">📝 Ad-hoc Information</div>
    <div class="section-sub">Record any additional topics or announcements</div>
    <textarea class="inp" rows="8" placeholder="E.g. upcoming audit on Thursday, new promo starts tomorrow, boss away next week…"
      oninput="state.adhoc=this.value">${state.adhoc}</textarea>
    <div style="color:var(--p-text3);font-size:0.75rem;margin-top:6px">${state.adhoc.length} characters</div>
  `;
}

// ── STEP 4: Issues ───────────────────────────────────────────────────────────

function renderIssues() {
  const carriedHtml = state.carriedIssues.map(issue => `
    <div class="issue-card carried">
      <div class="mb-8"><span class="badge badge-orange">⏩ Carried Forward</span></div>
      <div class="issue-text">${issue.text}</div>
      <div class="flex mb-8" style="flex-wrap:wrap;gap:8px">
        <button class="btn btn-sm btn-success ${issue.resolved===true?'active':''}" onclick="updateCarried(${issue.id},'resolved',true)">✅ Resolved</button>
        <button class="btn btn-sm btn-danger  ${issue.resolved===false?'active':''}" onclick="updateCarried(${issue.id},'resolved',false)">❌ Not Resolved</button>
      </div>
      <textarea class="inp" rows="2" placeholder="Add update…" oninput="updateCarried(${issue.id},'update',this.value)">${issue.update||''}</textarea>
    </div>
  `).join('');

  const issuesHtml = state.issues.map(issue => `
    <div class="issue-card">
      <div class="flex-between mb-8">
        <div class="issue-text" style="margin:0;flex:1">${issue.text}</div>
        <button onclick="removeIssue(${issue.id})" style="background:none;border:none;color:var(--p-red);cursor:pointer;font-size:1.1rem;padding:0;margin-left:10px">×</button>
      </div>
      <div class="flex mb-8" style="flex-wrap:wrap;gap:8px">
        <button class="btn btn-sm btn-success ${issue.resolved===true?'active':''}" onclick="updateIssue(${issue.id},'resolved',true)">✅ Resolved</button>
        <button class="btn btn-sm btn-danger  ${issue.resolved===false?'active':''}" onclick="updateIssue(${issue.id},'resolved',false)">❌ Not Resolved</button>
      </div>
      <textarea class="inp" rows="2" placeholder="Add update or notes…" oninput="updateIssue(${issue.id},'update',this.value)">${issue.update||''}</textarea>
    </div>
  `).join('');

  const empty = (state.carriedIssues.length + state.issues.length === 0)
    ? '<div class="empty-state">No issues logged yet.</div>' : '';

  return `
    <div class="section-hd">⚠️ Issues Log</div>
    <div class="section-sub">Log issues. Unresolved ones carry forward to next shift.</div>
    <div class="flex mb-12">
      <input class="inp" id="newIssueInput" placeholder="Describe the issue…" style="flex:1" onkeydown="if(event.key==='Enter')addIssue()">
      <button class="btn btn-primary btn-sm" onclick="addIssue()">+ Add</button>
    </div>
    ${carriedHtml}${issuesHtml}${empty}
  `;
}

function addIssue() {
  const inp = document.getElementById('newIssueInput');
  const t = inp ? inp.value.trim() : '';
  if (!t) return;
  state.issues.push({ id: Date.now(), text: t, resolved: null, update: '' });
  renderBriefing();
}
function removeIssue(id) { state.issues = state.issues.filter(i => i.id !== id); renderBriefing(); }
function updateIssue(id, field, val) { const i = state.issues.find(x => x.id === id); if (i) i[field] = val; if (field !== 'update') renderBriefing(); }
function updateCarried(id, field, val) { const i = state.carriedIssues.find(x => x.id === id); if (i) i[field] = val; if (field !== 'update') renderBriefing(); }

// ── STEP 5: Feedback ─────────────────────────────────────────────────────────

function renderFeedback() {
  const items = state.feedback.length
    ? state.feedback.map(fb => `
      <div class="fb-card">
        <div class="flex-between">
          <div class="fb-name">${fb.name}</div>
          <button onclick="removeFeedback(${fb.id})" style="background:none;border:none;color:var(--p-red);cursor:pointer;font-size:1rem">×</button>
        </div>
        <div class="fb-comment">${fb.comment}</div>
      </div>
    `).join('')
    : '<div class="empty-state">No feedback added yet.</div>';

  return `
    <div class="section-hd">💬 Attendee Feedback</div>
    <div class="section-sub">Collect feedback from staff who attended the briefing</div>
    <div class="card">
      <input class="inp mb-8" id="fbName" placeholder="Staff name (optional)">
      <textarea class="inp mb-8" id="fbComment" rows="3" placeholder="Feedback or comment…"></textarea>
      <button class="btn btn-primary btn-sm" onclick="addFeedback()">+ Add Feedback</button>
    </div>
    ${items}
  `;
}

function addFeedback() {
  const name = (document.getElementById('fbName')?.value || '').trim() || 'Anonymous';
  const comment = (document.getElementById('fbComment')?.value || '').trim();
  if (!comment) return;
  state.feedback.push({ id: Date.now(), name, comment });
  renderBriefing();
}
function removeFeedback(id) { state.feedback = state.feedback.filter(f => f.id !== id); renderBriefing(); }

// ── STEP 6: Closing ──────────────────────────────────────────────────────────

function renderClosing() {
  if (!state.remarks) state.remarks = state.closingMotiv;
  return `
    <div class="section-hd">🎙️ Closing Remarks</div>
    <div class="section-sub">A motivational one-liner has been added. Edit or add your own words.</div>
    <div class="motiv-box mb-12">
      <div class="motiv-label">✨ Auto-generated Motivational Closing</div>
      <div class="motiv-text">"${state.closingMotiv}"</div>
    </div>
    <textarea class="inp" rows="6" placeholder="Add your personal closing remarks…"
      oninput="state.remarks=this.value">${state.remarks}</textarea>
  `;
}

// ── STEP 7: Photos ───────────────────────────────────────────────────────────

function renderPhotos() {
  const grid = state.photos.length
    ? `<div class="photo-grid">${state.photos.map(p => `
        <div class="photo-thumb">
          <img src="${p.src}" alt="">
          <button class="photo-del" onclick="removePhoto('${p.id}')">×</button>
        </div>
      `).join('')}</div>`
    : '';

  return `
    <div class="section-hd">📸 Briefing Photos</div>
    <div class="section-sub">Upload photo proof of the briefing. No limit.</div>
    <div class="upload-zone" onclick="document.getElementById('photoInput').click()">
      <div class="upload-icon">📷</div>
      <div style="color:var(--p-text2);font-size:0.88rem">Click to upload photos</div>
      <div style="color:var(--p-text3);font-size:0.78rem;margin-top:4px">JPG, PNG, HEIC supported</div>
    </div>
    ${grid}
  `;
}

function handlePhotos(e) {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      state.photos.push({ id: Date.now() + Math.random(), src: ev.target.result, name: file.name });
      renderBriefing();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
function removePhoto(id) {
  state.photos = state.photos.filter(p => String(p.id) !== String(id));
  renderBriefing();
}

// ── STEP 8: Review ───────────────────────────────────────────────────────────

function renderReview() {
  const allSections = [...(state.shift === 'Day' ? MORNING_CHECKLIST : NIGHT_CHECKLIST), ...SA_CSA, ...GENERAL];
  const totalChk = allSections.reduce((a, s) => a + s.items.length, 0);
  const doneChk  = Object.values(state.checklist).filter(Boolean).length;
  const allIssues = [...state.carriedIssues, ...state.issues];
  const unresolved = allIssues.filter(i => i.resolved === false).length;

  const rows = [
    { l: 'Shift',                  v: state.shift + ' Shift' },
    { l: 'Date & Time',            v: new Date().toLocaleString('en-MY', { weekday:'short', day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) },
    { l: 'Staff Present',          v: state.attendance.length ? state.attendance.join(', ') : 'None' },
    { l: 'Checklist Items Ticked', v: `${doneChk} / ${totalChk} items` },
    { l: 'Issues Logged',          v: `${allIssues.length} (${unresolved} unresolved)` },
    { l: 'Feedback Entries',       v: state.feedback.length },
    { l: 'Photos',                 v: state.photos.length + ' uploaded' },
  ].map(r => `<div class="review-row"><span class="review-lbl">${r.l}</span><span class="review-val">${r.v}</span></div>`).join('');

  const remarkPreview = state.remarks
    ? `<div style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:var(--radius-sm);padding:12px 14px;margin-top:14px;color:#C7D2FE;font-size:0.85rem;font-style:italic">"${state.remarks}"</div>`
    : '';

  return `
    <div class="section-hd">✅ Review & Submit</div>
    <div class="section-sub">Summary before saving this briefing</div>
    <div class="card">${rows}${remarkPreview}</div>
    <div style="color:var(--p-text3);font-size:0.8rem;text-align:center;margin-top:8px">
      Tap "Save" to store this briefing. Unresolved issues will carry forward.
    </div>
  `;
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────

function nextStep() {
  if (state.step < STEP_LABELS.length - 1) {
    state.step++;
    renderBriefing();
    window.scrollTo(0, 0);
  } else {
    saveBriefing();
  }
}

function prevStep() {
  if (state.step > 0) {
    state.step--;
    renderBriefing();
    window.scrollTo(0, 0);
  }
}

// ─── SAVE ─────────────────────────────────────────────────────────────────────

function saveBriefing() {
  const ts = Date.now();
  const data = {
    timestamp: ts,
    shift: state.shift,
    attendance: [...state.attendance],
    checklist: { ...state.checklist },
    adhoc: state.adhoc,
    issues: [...state.carriedIssues.map(i => ({ ...i, isCarried: true })), ...state.issues],
    feedback: [...state.feedback],
    remarks: state.remarks,
    photos: state.photos.map(p => ({ id: p.id, src: p.src, name: p.name }))
  };
  lsSet(`briefing:${ts}`, data);
  showToast('✅ Briefing saved!');
  setTimeout(() => renderDashboard(), 800);
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────

let dbFilter = 'All';

function renderDashboard() {
  state.view = 'dashboard';
  document.getElementById('topTitle').textContent = 'All Briefings';
  document.getElementById('topShiftBadge').innerHTML = '';
  document.getElementById('stepPills').innerHTML = '';
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('bottomNav').style.display = 'none';

  const keys = lsList('briefing:');
  const briefings = keys.map(k => lsGet(k)).filter(Boolean).sort((a,b) => b.timestamp - a.timestamp);
  const filtered  = dbFilter === 'All' ? briefings : briefings.filter(b => b.shift === dbFilter);

  const filterBtns = ['All','Day','Night'].map(f => {
    const active = dbFilter === f;
    const label  = f === 'Day' ? '☀️ Day' : f === 'Night' ? '🌙 Night' : 'All';
    return `<button class="btn btn-sm ${active?'btn-primary':'btn-ghost'}" onclick="setDbFilter('${f}')">${label}</button>`;
  }).join('');

  const cards = filtered.length === 0
    ? '<div class="empty-state">No briefings found.</div>'
    : filtered.map(b => {
        const unresolved = (b.issues||[]).filter(i => i.resolved === false).length;
        const shiftColor = b.shift === 'Day' ? 'var(--p-orange)' : '#818CF8';
        const date = new Date(b.timestamp).toLocaleDateString('en-MY', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
        const time = new Date(b.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        const id   = 'db' + b.timestamp;

        return `<div class="db-card" onclick="toggleDbCard('${id}')">
          <div class="db-card-hdr">
            <div>
              <div class="flex mb-8" style="flex-wrap:wrap;gap:6px">
                <span class="badge" style="background:${shiftColor}22;color:${shiftColor}">${b.shift==='Day'?'☀️':'🌙'} ${b.shift} Shift</span>
                ${unresolved ? `<span class="badge badge-red">${unresolved} unresolved</span>` : ''}
              </div>
              <div style="font-weight:700;font-size:0.95rem;color:var(--p-text)">${date}</div>
              <div style="color:var(--p-text3);font-size:0.8rem">${time} · ${(b.attendance||[]).length} staff · ${(b.photos||[]).length} photos</div>
            </div>
            <span style="color:var(--p-text3)" id="chev-${id}">▼</span>
          </div>
          <div class="db-card-body" id="${id}">
            ${(b.attendance||[]).length ? `
              <div class="db-sub-title">Attendance</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
                ${b.attendance.map(n=>`<span class="badge badge-green">${n}</span>`).join('')}
              </div>` : ''}
            ${b.adhoc ? `
              <div class="db-sub-title">Ad-hoc Notes</div>
              <div style="color:var(--p-text2);font-size:0.83rem;line-height:1.6;margin-bottom:10px">${b.adhoc}</div>` : ''}
            ${(b.issues||[]).length ? `
              <div class="db-sub-title">Issues (${b.issues.length})</div>
              ${b.issues.map(i => `
                <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--p-border);gap:8px">
                  <div>
                    <div style="font-size:0.83rem;color:var(--p-text)">${i.text}</div>
                    ${i.update ? `<div style="font-size:0.75rem;color:var(--p-text3);margin-top:2px">↳ ${i.update}</div>` : ''}
                  </div>
                  <span class="badge ${i.resolved ? 'badge-green' : 'badge-red'}">${i.resolved ? 'Resolved' : 'Unresolved'}</span>
                </div>
              `).join('')}
            ` : ''}
            ${(b.feedback||[]).length ? `
              <div class="db-sub-title">Feedback</div>
              ${b.feedback.map(f=>`
                <div style="padding:5px 0;border-bottom:1px solid var(--p-border)">
                  <span style="color:var(--p-amber);font-size:0.78rem;font-weight:700">${f.name}: </span>
                  <span style="color:var(--p-text2);font-size:0.83rem">${f.comment}</span>
                </div>
              `).join('')}
            ` : ''}
            ${b.remarks ? `
              <div class="db-sub-title">Closing Remarks</div>
              <div style="color:#C7D2FE;font-size:0.85rem;font-style:italic;margin-bottom:10px">"${b.remarks}"</div>
            ` : ''}
            ${(b.photos||[]).length ? `
              <div class="db-sub-title">Photos (${b.photos.length})</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:6px">
                ${b.photos.map(p=>`<img src="${p.src}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px">`).join('')}
              </div>
            ` : ''}
          </div>
        </div>`;
      }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="flex-between mb-12">
      <div>
        <div class="section-hd">📊 Dashboard</div>
        <div style="color:var(--p-text3);font-size:0.82rem">${briefings.length} briefings recorded</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="renderHome()">+ New</button>
    </div>
    <div class="flex mb-12">${filterBtns}</div>
    ${cards}
  `;
}

function toggleDbCard(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (chev) chev.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function setDbFilter(f) { dbFilter = f; renderDashboard(); }

// ─── TOAST ───────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────

init();
</script>
</body>
</html>
