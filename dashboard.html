<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Petron Tasks</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .staff-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; }
    .staff-row__header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; cursor: pointer; }
    .staff-row__avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--accent2)); display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:1rem;flex-shrink:0; }
    .staff-row__name { font-weight: 700; flex: 1; }
    .staff-row__tasks { display: none; border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; }
    .staff-row__tasks--open { display: block; }

    .mini-task { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .mini-task:last-child { border-bottom: none; }
    .mini-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .mini-dot--done     { background: var(--success); }
    .mini-dot--approved { background: var(--success); box-shadow: 0 0 0 2px rgba(34,197,94,0.25); }
    .mini-dot--flagged  { background: var(--danger); }

    .signoff-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 600; padding: 2px 8px;
      border-radius: 99px; font-family: var(--mono);
    }
    .signoff-badge--approved { background: rgba(34,197,94,0.12); color: var(--success); }
    .signoff-badge--flagged  { background: rgba(239,68,68,0.12);  color: var(--danger); }
    .signoff-badge--pending  { background: rgba(79,138,255,0.10); color: var(--muted); }

    .refresh-btn { position: fixed; bottom: 90px; right: 24px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 1.3rem; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.2s; }
    .refresh-btn:hover { transform: rotate(30deg); }

    .supervisor-btn { position: fixed; bottom: 24px; right: 24px; display: flex; align-items: center; gap: 8px; padding: 13px 20px; border-radius: 99px; background: var(--accent2); border: none; color: white; font-family: var(--font); font-size: 0.9rem; font-weight: 600; cursor: pointer; box-shadow: var(--shadow); text-decoration: none; }
    .supervisor-btn:hover { background: #9d7dff; }

    .signoff-summary {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .signoff-pill {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 10px; text-align: center;
    }
    .signoff-pill__num { font-size: 1.4rem; font-weight: 700; font-family: var(--mono); }
    .signoff-pill__label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .signoff-pill--approved .signoff-pill__num { color: var(--success); }
    .signoff-pill--flagged  .signoff-pill__num { color: var(--danger); }
    .signoff-pill--pending  .signoff-pill__num { color: var(--accent); }
  </style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="lead.html" class="btn btn--ghost btn--sm">← Setup</a>
    <div class="topbar__logo">Petron<span> Dashboard</span></div>
    <div class="text-sm text-muted" id="clock"></div>
  </div>

  <!-- Branch selector -->
  <div style="padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span class="text-sm text-muted" style="font-weight:600">Branch:</span>
    <button onclick="switchBranch('Safari')" id="btn-Safari"
      style="padding:6px 16px;border-radius:99px;border:1px solid var(--accent);background:var(--accent);color:white;font-family:var(--font);font-size:0.85rem;font-weight:600;cursor:pointer">
      Safari
    </button>
    <button onclick="switchBranch('Nilai Desa Jati')" id="btn-Nilai Desa Jati"
      style="padding:6px 16px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);font-size:0.85rem;font-weight:600;cursor:pointer">
      Nilai Desa Jati
    </button>
  </div>

  <div class="content content--wide">
    <div style="margin-bottom:20px">
      <div style="font-size:1.3rem;font-weight:700">Live Overview</div>
      <div class="text-muted text-sm" id="dateLabel"></div>
    </div>

    <!-- Task completion stats -->
    <div class="stats-row">
      <div class="stat-card stat-card--green">
        <div class="stat-card__num" id="statDone">–</div>
        <div class="stat-card__label">Completed</div>
      </div>
      <div class="stat-card stat-card--amber">
        <div class="stat-card__num" id="statPending">–</div>
        <div class="stat-card__label">Pending</div>
      </div>
      <div class="stat-card stat-card--blue">
        <div class="stat-card__num" id="statTotal">–</div>
        <div class="stat-card__label">Total Tasks</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:24px">
      <div class="flex flex--between" style="margin-bottom:8px">
        <span class="text-sm" style="font-weight:600">Overall Progress</span>
        <span class="text-sm text-muted" id="overallLabel">–</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar__fill" id="overallFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Sign-off summary -->
    <div class="section-title">Supervisor Sign-Off Status</div>
    <div class="signoff-summary">
      <div class="signoff-pill signoff-pill--approved">
        <div class="signoff-pill__num" id="soApproved">–</div>
        <div class="signoff-pill__label">Approved</div>
      </div>
      <div class="signoff-pill signoff-pill--flagged">
        <div class="signoff-pill__num" id="soFlagged">–</div>
        <div class="signoff-pill__label">Flagged</div>
      </div>
      <div class="signoff-pill signoff-pill--pending">
        <div class="signoff-pill__num" id="soPending">–</div>
        <div class="signoff-pill__label">Awaiting review</div>
      </div>
    </div>

    <div class="section-title">Staff Progress</div>
    <div id="staffRows"><div class="empty-state">Loading...</div></div>
  </div>
</div>

<button class="refresh-btn" onclick="loadDashboard()" title="Refresh">↻</button>
<a href="supervisor.html" class="supervisor-btn">Sign-Off Review</a>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });

  window.currentBranch = 'Safari';

  function switchBranch(branch) {
    window.currentBranch = branch;
    // Update button styles
    ['Safari', 'Nilai Desa Jati'].forEach(b => {
      const btn = document.getElementById('btn-' + b);
      if (!btn) return;
      if (b === branch) {
        btn.style.background = 'var(--accent)';
        btn.style.borderColor = 'var(--accent)';
        btn.style.color = 'white';
      } else {
        btn.style.background = 'transparent';
        btn.style.borderColor = 'var(--border)';
        btn.style.color = 'var(--muted)';
      }
    });
    loadDashboard();
  }

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  updateClock(); setInterval(updateClock, 1000);
  setInterval(loadDashboard, 30000);

  async function loadDashboard() {
    document.getElementById('staffRows').innerHTML = '<div class="empty-state">Loading...</div>';
    document.getElementById('statDone').textContent    = '–';
    document.getElementById('statPending').textContent = '–';
    document.getElementById('statTotal').textContent   = '–';
    document.getElementById('soApproved').textContent  = '–';
    document.getElementById('soFlagged').textContent   = '–';
    document.getElementById('soPending').textContent   = '–';
    const branch = window.currentBranch || 'Safari';
    const { data: assignments, error } = await db
      .from('daily_assignments')
      .select(`
        id, is_adhoc, custom_task_name, staff_id,
        task_templates(name, photo_required, category_id, subcategory_id, subgroup_id, sort_order,
          categories(id, name, sort_order),
          subcategories(id, name, sort_order),
          subgroups(id, name, sort_order)
        ),
        completions(id, completed_at, photo_url, signoff_status),
        users(id, name)
      `)
      .eq('date', today())
      .eq('branch', branch);

    if (error || !assignments) return;

    // Group by staff
    const byStaff = {};
    let soApproved = 0, soFlagged = 0, soPending = 0;

    for (const a of assignments) {
      const sid = a.staff_id;
      if (!byStaff[sid]) byStaff[sid] = { name: a.users?.name || 'Unknown', tasks: [] };
      const completion    = a.completions?.[0] || null;
      const signoffStatus = completion?.signoff_status || null;
      const tpl           = a.task_templates;
      const rawName       = a.is_adhoc ? a.custom_task_name : (tpl?.name || 'Task');
      const isStock       = a.is_adhoc && rawName?.startsWith('TOPUP:');
      const taskName      = isStock ? rawName.split(':').slice(3).join(':') : rawName;

      if (completion) {
        if (signoffStatus === 'approved') soApproved++;
        else if (signoffStatus === 'flagged') soFlagged++;
        else soPending++;
      }

      byStaff[sid].tasks.push({
        name:           taskName,
        done:           !!completion,
        completed_at:   completion?.completed_at,
        photo_url:      completion?.photo_url,
        signoff_status: signoffStatus,
        is_adhoc:       a.is_adhoc && !isStock,
        cat_id:         isStock ? '__stock_cat__' : (tpl?.category_id || null),
        cat_name:       isStock ? 'Stocks & Merchandise (Top-up)' : (tpl?.categories?.name || null),
        cat_order:      isStock ? 2 : (tpl?.categories?.sort_order ?? 99),
        sub_id:         isStock ? '__stock_' + rawName.split(':')[1] + '__' : (tpl?.subcategory_id || null),
        sub_name:       isStock ? rawName.split(':')[1] : (tpl?.subcategories?.name || null),
        sub_order:      isStock ? 1 : (tpl?.subcategories?.sort_order ?? 99),
        grp_id:         isStock ? '__stock_grp_' + rawName.split(':')[2] + '__' : (tpl?.subgroup_id || null),
        grp_name:       isStock ? rawName.split(':')[2] : (tpl?.subgroups?.name || null),
        grp_order:      99,
      });
    }

    document.getElementById('soApproved').textContent = soApproved;
    document.getElementById('soFlagged').textContent  = soFlagged;
    document.getElementById('soPending').textContent  = soPending;

    let totalDone = 0, totalAll = 0;
    const container = document.getElementById('staffRows');
    const entries = Object.entries(byStaff);

    if (entries.length === 0) {
      container.innerHTML = '<div class="empty-state">No tasks assigned today.</div>';
      return;
    }

    container.innerHTML = entries.map(([sid, data]) => {
      const done  = data.tasks.filter(t => t.done).length;
      const total = data.tasks.length;
      totalDone += done; totalAll += total;
      const allDone = done === total && total > 0;
      const hasFlagged = data.tasks.some(t => t.signoff_status === 'flagged');
      const initials = data.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

      // Group tasks by category → subcategory → subgroup
      const catMap = {};
      for (const t of data.tasks) {
        const cid = t.cat_id || '__none__';
        if (!catMap[cid]) catMap[cid] = { name: t.cat_name || 'Other', order: t.cat_order || 99, subs: {} };
        const sid2 = t.sub_id || '__none__';
        if (!catMap[cid].subs[sid2]) catMap[cid].subs[sid2] = { name: t.sub_name, order: t.sub_order || 99, grps: {}, direct: [] };
        if (t.grp_id) {
          if (!catMap[cid].subs[sid2].grps[t.grp_id]) catMap[cid].subs[sid2].grps[t.grp_id] = { name: t.grp_name, order: t.grp_order || 99, tasks: [] };
          catMap[cid].subs[sid2].grps[t.grp_id].tasks.push(t);
        } else {
          catMap[cid].subs[sid2].direct.push(t);
        }
      }

      let tieredHtml = '';
      const sortedCats = Object.entries(catMap).sort((a,b) => a[1].order - b[1].order);

      for (const [cid2, cat] of sortedCats) {
        const catTasks = Object.values(cat.subs).flatMap(s => [...s.direct, ...Object.values(s.grps).flatMap(g => g.tasks)]);
        const catDone  = catTasks.filter(t => t.done).length;
        const catAll   = catTasks.length === catDone && catDone > 0;
        let subcatHtml = '';

        const sortedSubs = Object.entries(cat.subs).sort((a,b) => a[1].order - b[1].order);
        for (const [sid2, sub] of sortedSubs) {
          const allSubTasks = [...sub.direct, ...Object.values(sub.grps).flatMap(g => g.tasks)];
          const subDone = allSubTasks.filter(t => t.done).length;
          let subContent = sub.direct.map(t => miniTaskRow(t)).join('');

          const sortedGrps = Object.entries(sub.grps).sort((a,b) => a[1].order - b[1].order);
          for (const [gid, grp] of sortedGrps) {
            const grpDone = grp.tasks.filter(t => t.done).length;
            const grpRows = grp.tasks.map(t => miniTaskRow(t)).join('');
            subContent += `
              <div class="ac-grp">
                <div class="ac-grp-header" onclick="tog('dg-${sid}-${gid}','dgc-${sid}-${gid}')">
                  <span class="ac-grp-name">${grp.name}</span>
                  <div style="display:flex;align-items:center">
                    <span class="count-pill ${grpDone===grp.tasks.length&&grp.tasks.length>0?'done':''}">${grpDone}/${grp.tasks.length}</span>
                    <span class="ac-chev" id="dgc-${sid}-${gid}">▼</span>
                  </div>
                </div>
                <div class="ac-grp-body" id="dg-${sid}-${gid}">${grpRows}</div>
              </div>`;
          }

          if (sid2 === '__none__') {
            subcatHtml += subContent;
          } else {
            subcatHtml += `
              <div class="ac-sub">
                <div class="ac-sub-header" onclick="tog('ds-${sid}-${sid2}','dsc-${sid}-${sid2}')">
                  <span class="ac-sub-name">${sub.name || ''}</span>
                  <div style="display:flex;align-items:center">
                    <span class="count-pill ${subDone===allSubTasks.length&&allSubTasks.length>0?'done':''}">${subDone}/${allSubTasks.length}</span>
                    <span class="ac-chev" id="dsc-${sid}-${sid2}">▼</span>
                  </div>
                </div>
                <div class="ac-sub-body" id="ds-${sid}-${sid2}">${subContent}</div>
              </div>`;
          }
        }

        tieredHtml += `
          <div class="ac-cat">
            <div class="ac-cat-header" onclick="tog('dc-${sid}-${cid2}','dcc-${sid}-${cid2}')">
              <span class="ac-cat-name">${cat.name}</span>
              <div style="display:flex;align-items:center">
                <span class="count-pill ${catAll?'done':''}">${catDone}/${catTasks.length}</span>
                <span class="ac-chev" id="dcc-${sid}-${cid2}">▼</span>
              </div>
            </div>
            <div class="ac-cat-body" id="dc-${sid}-${cid2}">${subcatHtml}</div>
          </div>`;
      }

      const pill = `<span class="count-pill ${allDone?'done':''}">${done}/${total}</span>`;
      return `
        <div class="ac-staff">
          <div class="ac-staff-header" id="ash-${sid}" onclick="togStaff('asb-${sid}','ash-${sid}','asc-${sid}')">
            <div class="ac-staff-avatar">${initials}</div>
            <div class="ac-staff-name">${data.name}</div>
            ${hasFlagged ? '<span style="color:var(--danger);font-size:0.85rem">⚠</span>' : ''}
            ${pill}
            <span class="ac-chev" id="asc-${sid}">▼</span>
          </div>
          <div class="ac-staff-body" id="asb-${sid}">
            <div class="progress-bar" style="margin:0;border-radius:0;height:4px">
              <div class="progress-bar__fill" style="width:${total?Math.round((done/total)*100):0}%"></div>
            </div>
            ${tieredHtml}
          </div>
        </div>`;
    }).join('');

    document.getElementById('statDone').textContent    = totalDone;
    document.getElementById('statPending').textContent = totalAll - totalDone;
    document.getElementById('statTotal').textContent   = totalAll;
    document.getElementById('overallLabel').textContent = `${totalDone} / ${totalAll}`;
    document.getElementById('overallFill').style.width = totalAll ? `${(totalDone/totalAll)*100}%` : '0%';
  }

  function miniTaskRow(t) {
    let dotClass = 'mini-dot';
    if (t.done) {
      dotClass = t.signoff_status === 'approved' ? 'mini-dot mini-dot--approved'
               : t.signoff_status === 'flagged'  ? 'mini-dot mini-dot--flagged'
               : 'mini-dot mini-dot--done';
    }
    const signoffBadge = t.done
      ? t.signoff_status === 'approved'
        ? '<span class="signoff-badge signoff-badge--approved">Approved</span>'
        : t.signoff_status === 'flagged'
          ? '<span class="signoff-badge signoff-badge--flagged">Flagged</span>'
          : '<span class="signoff-badge signoff-badge--pending">Awaiting</span>'
      : '';
    return `
      <div class="mini-task">
        <div class="${dotClass}"></div>
        <div style="flex:1;font-size:0.85rem">${t.name}</div>
        ${t.done ? `<span class="text-sm text-muted">${formatTime(t.completed_at)}</span>` : '<span class="badge badge--pending" style="font-size:0.7rem">Pending</span>'}
        ${signoffBadge}
        ${t.photo_url ? `<a href="${t.photo_url}" target="_blank" class="btn btn--ghost btn--sm" style="padding:3px 7px;font-size:0.72rem">Photo</a>` : ''}
      </div>`;
  }

  function tog(bodyId, chevId) {
    document.getElementById(bodyId)?.classList.toggle('open');
    document.getElementById(chevId)?.classList.toggle('open');
  }

  function togStaff(bodyId, headerId, chevId) {
    const opening = !document.getElementById(bodyId)?.classList.contains('open');
    document.getElementById(bodyId)?.classList.toggle('open', opening);
    document.getElementById(headerId)?.classList.toggle('open', opening);
    document.getElementById(chevId)?.classList.toggle('open', opening);
  }

  loadDashboard();
</script>
</body>
</html>
