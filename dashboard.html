<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – Petron Tasks</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .ac-staff { margin-bottom:10px; }
    .ac-staff-hdr { display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;user-select:none; }
    .ac-staff-hdr:hover { border-color:var(--accent); }
    .ac-staff-hdr.open { border-radius:var(--radius) var(--radius) 0 0;border-bottom-color:transparent; }
    .ac-staff-av { width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:1rem;flex-shrink:0; }
    .ac-staff-nm { font-weight:700;flex:1;font-size:0.97rem; }
    .ac-staff-bd { display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden; }
    .ac-staff-bd.open { display:block; }
    .ac-cat-hdr { display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface2);cursor:pointer;border-bottom:1px solid var(--border); }
    .ac-cat-hdr:hover { background:var(--surface); }
    .ac-cat-bd { display:none; }
    .ac-cat-bd.open { display:block; }
    .ac-sub-hdr { display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:var(--surface);cursor:pointer;border-bottom:1px solid var(--border);border-left:3px solid var(--border); }
    .ac-sub-hdr:hover { background:var(--surface2); }
    .ac-sub-bd { display:none; }
    .ac-sub-bd.open { display:block; }
    .ac-grp-hdr { display:flex;align-items:center;justify-content:space-between;padding:7px 28px;background:var(--surface2);cursor:pointer;border-bottom:1px solid var(--border);border-left:3px solid var(--accent); }
    .ac-grp-hdr:hover { background:var(--surface); }
    .ac-grp-bd { display:none; }
    .ac-grp-bd.open { display:block; }
    .chev { font-size:0.7rem;color:var(--muted);transition:transform 0.2s;margin-left:6px; }
    .chev.open { transform:rotate(180deg); }
    .cpill { font-size:0.72rem;font-family:var(--mono);padding:2px 8px;border-radius:99px;background:rgba(79,138,255,0.15);color:var(--accent);margin-right:4px; }
    .cpill.done { background:rgba(34,197,94,0.15);color:var(--success); }
    .mtask { display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border); }
    .mtask:last-child { border-bottom:none; }
    .mdot { width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0; }
    .mdot.done { background:var(--success); }
    .mdot.approved { background:var(--success);box-shadow:0 0 0 2px rgba(34,197,94,0.25); }
    .mdot.flagged { background:var(--danger); }
    .sbadge { font-size:0.68rem;font-weight:600;padding:2px 8px;border-radius:99px;font-family:var(--mono); }
    .sbadge.approved { background:rgba(34,197,94,0.12);color:var(--success); }
    .sbadge.flagged  { background:rgba(239,68,68,0.12);color:var(--danger); }
    .sbadge.pending  { background:rgba(79,138,255,0.10);color:var(--muted); }
    .refresh-btn { position:fixed;bottom:90px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:1.3rem;cursor:pointer;box-shadow:var(--shadow);transition:transform 0.2s; }
    .refresh-btn:hover { transform:rotate(30deg); }
    .sup-btn { position:fixed;bottom:24px;right:24px;display:flex;align-items:center;gap:8px;padding:13px 20px;border-radius:99px;background:var(--accent2);border:none;color:white;font-family:var(--font);font-size:0.9rem;font-weight:600;cursor:pointer;box-shadow:var(--shadow);text-decoration:none; }
    .signoff-summary { display:flex;gap:8px;margin-bottom:24px; }
    .so-pill { flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;text-align:center; }
    .so-pill__num { font-size:1.4rem;font-weight:700;font-family:var(--mono); }
    .so-pill__lbl { font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px; }
    .so-pill.approved .so-pill__num { color:var(--success); }
    .so-pill.flagged  .so-pill__num { color:var(--danger); }
    .so-pill.pending  .so-pill__num { color:var(--accent); }

  </style>
</head>
<body>
<div class="page">
  <div class="topbar" style="position:relative">
    <!-- Branch dropdown left -->
    <select id="branchSelect" onchange="switchBranch(this.value)"
      style="padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:0.85rem;font-weight:600;outline:none;cursor:pointer;min-width:150px">
      <option value="Safari">Safari</option>
      <option value="Nilai Desa Jati">Nilai Desa Jati</option>
    </select>
    <!-- Big centred title -->
    <div style="position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none">
      <div style="font-size:1.5rem;font-weight:800;letter-spacing:-0.5px;color:var(--text)" id="dashTitle">Safari Dashboard</div>
    </div>
    <!-- Date navigator right -->
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
      <button onclick="shiftDate(-1)" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:1rem;cursor:pointer;padding:0;line-height:1">‹</button>
      <div style="text-align:center;min-width:130px">
        <span style="font-size:0.82rem;font-weight:600;color:var(--text)" id="dateDisplay">—</span>
        <span style="font-size:0.7rem;color:var(--accent);margin-left:4px" id="dateSubDisplay"></span>
      </div>
      <button onclick="shiftDate(1)" id="nextDateBtn" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:1rem;cursor:pointer;padding:0;line-height:1">›</button>
    </div>
    <input type="hidden" id="dashDate">
  </div>

  <div class="content content--wide">


    <div class="stats-row">
      <div class="stat-card stat-card--green"><div class="stat-card__num" id="statDone">–</div><div class="stat-card__label">Completed</div></div>
      <div class="stat-card stat-card--amber"><div class="stat-card__num" id="statPending">–</div><div class="stat-card__label">Pending</div></div>
      <div class="stat-card stat-card--blue"><div class="stat-card__num" id="statTotal">–</div><div class="stat-card__label">Total Tasks</div></div>
    </div>

    <div class="card" style="margin-bottom:24px">
      <div class="flex flex--between" style="margin-bottom:8px">
        <span class="text-sm" style="font-weight:600">Overall Progress</span>
        <span class="text-sm text-muted" id="overallLabel">–</span>
      </div>
      <div class="progress-bar"><div class="progress-bar__fill" id="overallFill" style="width:0%"></div></div>
    </div>

    <div class="section-title">Supervisor Sign-Off Status</div>
    <div class="signoff-summary">
      <div class="so-pill approved"><div class="so-pill__num" id="soApproved">–</div><div class="so-pill__lbl">Approved</div></div>
      <div class="so-pill flagged"><div class="so-pill__num" id="soFlagged">–</div><div class="so-pill__lbl">Flagged</div></div>
      <div class="so-pill pending"><div class="so-pill__num" id="soPending">–</div><div class="so-pill__lbl">Awaiting Review</div></div>
    </div>

    <div class="section-title">Staff Progress</div>
    <div id="staffRows"><div class="empty-state">Loading...</div></div>
  </div>
</div>

<button class="refresh-btn" onclick="loadDashboard()" title="Refresh">↻</button>
<a href="supervisor.html" class="sup-btn">Sign-Off Review</a>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }
  updateClock(); setInterval(updateClock, 1000);
  setInterval(loadDashboard, 30000);

  let currentBranch = 'Safari';

  function getSelectedDate() {
    return document.getElementById('dashDate')?.value || today();
  }

  function goToday() {
    document.getElementById('dashDate').value = today();
    updateDateDisplay();
    loadDashboard();
  }

  function shiftDate(days) {
    const current = document.getElementById('dashDate').value || today();
    // Parse date parts directly to avoid timezone issues
    const parts = current.split('-');
    const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    d.setDate(d.getDate() + days);
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const newDate = y+'-'+m+'-'+day;
    if (newDate > today()) return;
    document.getElementById('dashDate').value = newDate;
    updateDateDisplay();
    loadDashboard();
  }

  function updateDateDisplay() {
    const val = document.getElementById('dashDate').value || today();
    const isToday = val === today();
    const parts = val.split('-');
    const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    document.getElementById('dateDisplay').textContent =
      d.toLocaleDateString([], { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    document.getElementById('dateSubDisplay').textContent = isToday ? '● Today' : '';
    const nextBtn = document.getElementById('nextDateBtn');
    if (nextBtn) {
      nextBtn.style.opacity = isToday ? '0.3' : '1';
      nextBtn.style.cursor  = isToday ? 'not-allowed' : 'pointer';
    }
  }

  // Set date to today on load
  window.addEventListener('load', () => {
    const dp = document.getElementById('dashDate');
    if (dp) { dp.value = today(); updateDateDisplay(); }
  });

  function switchBranch(branch) {
    currentBranch = branch;
    document.getElementById('branchSelect').value = branch;
    document.getElementById('dashTitle').textContent = branch + ' Dashboard';
    loadDashboard();
  }

  function tog(bId, cId) {
    const b=document.getElementById(bId), c=document.getElementById(cId);
    if(!b||!c) return;
    b.classList.toggle('open'); c.classList.toggle('open');
  }
  function togStaff(bId, hId, cId) {
    const opening = !document.getElementById(bId)?.classList.contains('open');
    document.getElementById(bId)?.classList.toggle('open', opening);
    document.getElementById(hId)?.classList.toggle('open', opening);
    document.getElementById(cId)?.classList.toggle('open', opening);
  }

  function pill(done, total) {
    const cls = (done===total && total>0) ? 'cpill done' : 'cpill';
    return `<span class="${cls}">${done}/${total}</span>`;
  }

  function mtask(t) {
    const dotCls = !t.done ? 'mdot' : t.signoff_status==='approved' ? 'mdot approved' : t.signoff_status==='flagged' ? 'mdot flagged' : 'mdot done';
    const badge  = t.done
      ? t.signoff_status==='approved' ? '<span class="sbadge approved">Approved</span>'
      : t.signoff_status==='flagged'  ? '<span class="sbadge flagged">Flagged</span>'
      : '<span class="sbadge pending">Awaiting</span>'
      : '';
    return `<div class="mtask">
      <div class="${dotCls}"></div>
      <div style="flex:1;font-size:0.85rem">${t.name}</div>
      ${t.done ? `<span class="text-sm text-muted">${formatTime(t.completed_at)}</span>` : '<span class="badge badge--pending" style="font-size:0.7rem">Pending</span>'}
      ${badge}
      ${t.photo_url ? `<a href="${t.photo_url}" target="_blank" class="btn btn--ghost btn--sm" style="padding:3px 7px;font-size:0.7rem">Photo</a>` : ''}
    </div>`;
  }

  async function loadDashboard() {
    document.getElementById('staffRows').innerHTML = '<div class="empty-state">Loading...</div>';
    const selectedDate = getSelectedDate();

    const { data: assignments, error } = await db
      .from('daily_assignments')
      .select(`
        id, is_adhoc, custom_task_name, staff_id,
        task_templates(
          name, photo_required, category_id, subcategory_id, subgroup_id, sort_order,
          categories(id, name, sort_order),
          subcategories(id, name, sort_order),
          subgroups(id, name, sort_order)
        ),
        completions(id, completed_at, photo_url, signoff_status),
        users(id, name)
      `)
      .eq('date', getSelectedDate())
      .eq('branch', currentBranch);

    if (error || !assignments) { document.getElementById('staffRows').innerHTML = '<div class="empty-state">Error loading.</div>'; return; }

    const byStaff = {};
    let soApproved=0, soFlagged=0, soPending=0;

    for (const a of assignments) {
      const sid = a.staff_id;
      if (!byStaff[sid]) byStaff[sid] = { name: a.users?.name || 'Unknown', tasks: [] };
      const comp = a.completions?.[0] || null;
      const ss   = comp?.signoff_status || null;
      const tpl  = a.task_templates;
      const raw  = a.custom_task_name || '';
      const isStock = a.is_adhoc && raw.startsWith('TOPUP:');
      const name = isStock ? raw.split(':').slice(3).join(':') : (a.is_adhoc ? raw : (tpl?.name || 'Task'));

      if (comp) {
        if (ss==='approved') soApproved++;
        else if (ss==='flagged') soFlagged++;
        else soPending++;
      }

      byStaff[sid].tasks.push({
        name, done:!!comp,
        completed_at: comp?.completed_at, photo_url: comp?.photo_url,
        signoff_status: ss,
        cat_id:    isStock?'__stk__':(tpl?.category_id||null),
        cat_name:  isStock?'Stocks & Merchandise (Top-up)':(tpl?.categories?.name||null),
        cat_order: isStock?2:(tpl?.categories?.sort_order??99),
        sub_id:    isStock?('__s_'+raw.split(':')[1]):(tpl?.subcategory_id||null),
        sub_name:  isStock?raw.split(':')[1]:(tpl?.subcategories?.name||null),
        sub_order: isStock?1:(tpl?.subcategories?.sort_order??99),
        grp_id:    isStock?('__g_'+raw.split(':')[2]):(tpl?.subgroup_id||null),
        grp_name:  isStock?raw.split(':')[2]:(tpl?.subgroups?.name||null),
      });
    }

    let totalDone=0, totalAll=0;
    const container = document.getElementById('staffRows');
    const entries = Object.entries(byStaff);

    if (!entries.length) { container.innerHTML='<div class="empty-state">No tasks assigned today.</div>'; return; }

    container.innerHTML = entries.map(([sid, data]) => {
      const done  = data.tasks.filter(t=>t.done).length;
      const total = data.tasks.length;
      totalDone+=done; totalAll+=total;
      const hasFlagged = data.tasks.some(t=>t.signoff_status==='flagged');
      const initials = data.name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

      // Build cat→sub→grp tree
      const catMap={};
      for (const t of data.tasks) {
        const cid=t.cat_id||'__none__';
        if(!catMap[cid]) catMap[cid]={name:t.cat_name||'Other',order:t.cat_order||99,subs:{}};
        const subid=t.sub_id||'__none__';
        if(!catMap[cid].subs[subid]) catMap[cid].subs[subid]={name:t.sub_name,order:t.sub_order||99,grps:{},direct:[]};
        if(t.grp_id) {
          if(!catMap[cid].subs[subid].grps[t.grp_id]) catMap[cid].subs[subid].grps[t.grp_id]={name:t.grp_name,tasks:[]};
          catMap[cid].subs[subid].grps[t.grp_id].tasks.push(t);
        } else {
          catMap[cid].subs[subid].direct.push(t);
        }
      }

      let tiered='';
      for (const [cid,cat] of Object.entries(catMap).sort((a,b)=>a[1].order-b[1].order)) {
        const catTasks = Object.values(cat.subs).flatMap(s=>[...s.direct,...Object.values(s.grps).flatMap(g=>g.tasks)]);
        const cd=catTasks.filter(t=>t.done).length;
        let subHtml='';
        for (const [subid,sub] of Object.entries(cat.subs).sort((a,b)=>a[1].order-b[1].order)) {
          const subTasks=[...sub.direct,...Object.values(sub.grps).flatMap(g=>g.tasks)];
          const sd=subTasks.filter(t=>t.done).length;
          let sc=sub.direct.map(t=>mtask(t)).join('');
          for (const [gid,grp] of Object.entries(sub.grps)) {
            const gd=grp.tasks.filter(t=>t.done).length;
            const gr=grp.tasks.map(t=>mtask(t)).join('');
            sc+=`<div class="ac-grp-hdr" onclick="tog('gb-${sid}-${gid}','gc-${sid}-${gid}')">
              <span style="font-size:0.78rem;font-weight:600;color:var(--accent)">${grp.name}</span>
              <div style="display:flex;align-items:center">${pill(gd,grp.tasks.length)}<span class="chev" id="gc-${sid}-${gid}">▼</span></div>
            </div>
            <div class="ac-grp-bd" id="gb-${sid}-${gid}">${gr}</div>`;
          }
          if(subid==='__none__') { subHtml+=sc; }
          else {
            subHtml+=`<div class="ac-sub-hdr" onclick="tog('sb-${sid}-${subid}','sc-${sid}-${subid}')">
              <span style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted)">${sub.name||''}</span>
              <div style="display:flex;align-items:center">${pill(sd,subTasks.length)}<span class="chev" id="sc-${sid}-${subid}">▼</span></div>
            </div>
            <div class="ac-sub-bd" id="sb-${sid}-${subid}">${sc}</div>`;
          }
        }
        if(cid==='__none__') { tiered+=subHtml; }
        else {
          tiered+=`<div class="ac-cat-hdr" onclick="tog('cb-${sid}-${cid}','cc-${sid}-${cid}')">
            <span style="font-size:0.88rem;font-weight:700;color:var(--text)">${cat.name}</span>
            <div style="display:flex;align-items:center">${pill(cd,catTasks.length)}<span class="chev" id="cc-${sid}-${cid}">▼</span></div>
          </div>
          <div class="ac-cat-bd" id="cb-${sid}-${cid}">${subHtml}</div>`;
        }
      }

      return `<div class="ac-staff">
        <div class="ac-staff-hdr ${hasFlagged?'':''}\" id="ah-${sid}" onclick="togStaff('ab-${sid}','ah-${sid}','ac-${sid}')">
          <div class="ac-staff-av">${initials}</div>
          <div class="ac-staff-nm">${data.name}</div>
          ${hasFlagged?'<span style="color:var(--danger)">⚠</span>':''}
          ${pill(done,total)}
          <span class="chev" id="ac-${sid}">▼</span>
        </div>
        <div class="ac-staff-bd" id="ab-${sid}">
          <div class="progress-bar" style="margin:0;border-radius:0;height:3px">
            <div class="progress-bar__fill" style="width:${total?Math.round((done/total)*100):0}%"></div>
          </div>
          ${tiered}
        </div>
      </div>`;
    }).join('');

    document.getElementById('statDone').textContent    = totalDone;
    document.getElementById('statPending').textContent = totalAll-totalDone;
    document.getElementById('statTotal').textContent   = totalAll;
    document.getElementById('overallLabel').textContent= `${totalDone} / ${totalAll}`;
    document.getElementById('overallFill').style.width = totalAll?`${(totalDone/totalAll)*100}%`:'0%';
    document.getElementById('soApproved').textContent  = soApproved;
    document.getElementById('soFlagged').textContent   = soFlagged;
    document.getElementById('soPending').textContent   = soPending;
  }

  loadDashboard();
</script>
</body>
</html>
