<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shift Briefing – Petron Tasks</title>
  <link rel="stylesheet" href="style.css">
  <style>
  /* ── Sidebar ─────────────────────────────── */
  body { display:flex; }
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: #0F1B3D;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 100;
    padding: 0;
    transition: transform 0.25s ease;
  }
  .sidebar__logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-family: 'Syne', sans-serif;
    font-size: 1.15rem;
    font-weight: 800;
    color: white;
    letter-spacing: -0.3px;
  }
  .sidebar__logo span { color: #E31837; }
  .sidebar__nav {
    flex: 1;
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar__link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 20px;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 600;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    cursor: pointer;
    background: none;
    border-top: none;
    border-right: none;
    border-bottom: none;
    font-family: var(--font);
    width: 100%;
    text-align: left;
  }
  .sidebar__link:hover {
    background: rgba(255,255,255,0.06);
    color: white;
    border-left-color: rgba(255,255,255,0.3);
  }
  .sidebar__link.active {
    background: rgba(255,255,255,0.1);
    color: white;
    border-left-color: #E31837;
  }
  .sidebar__link svg {
    width: 18px; height: 18px; flex-shrink: 0; opacity: 0.8;
  }
  .sidebar__link.active svg { opacity: 1; }
  .sidebar__footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 0.72rem;
    color: rgba(255,255,255,0.3);
  }
  .page-wrap {
    margin-left: 220px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    width: calc(100% - 220px);
  }
  @media (max-width: 640px) {
    .sidebar { transform: translateX(-220px); }
    .sidebar.open { transform: translateX(0); }
    .page-wrap { margin-left: 0; width: 100%; }
    .sidebar-toggle {
      display: flex !important;
    }
  }
  .sidebar-toggle {
    display: none;
    position: fixed;
    top: 14px; left: 14px;
    z-index: 200;
    background: #0F1B3D;
    border: none;
    color: white;
    width: 36px; height: 36px;
    border-radius: 8px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.1rem;
  }
  </style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar__logo">Petron<span>Tasks</span></div>
  <nav class="sidebar__nav">
    <a href="index.html" class="sidebar__link" id="snav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="dashboard.html" class="sidebar__link" id="snav-dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="briefing.html" class="sidebar__link" id="snav-briefing">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Shift Briefing
    </a>
    <a href="lead.html" class="sidebar__link" id="snav-lead">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Lead Panel
    </a>
    <a href="supervisor.html" class="sidebar__link" id="snav-supervisor">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Sign-Off Review
    </a>
  </nav>
  <div class="sidebar__footer">Petron Tasks © 2026</div>
</div>
<button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')" title="Menu">☰</button>

<div class="page-wrap">
<div class="page">
  <div class="topbar">
    <div class="topbar__logo">Shift<span> Briefing</span></div>
  </div>
  <div class="content">
    <div style="margin-bottom:24px">
      <div style="font-size:1.3rem;font-weight:700">Shift Briefing</div>
      <div class="text-muted text-sm" id="briefDateLabel"></div>
    </div>
    <div class="empty-state" style="margin-top:60px">
      <div style="font-size:2rem;margin-bottom:12px">📋</div>
      <div style="font-weight:700;margin-bottom:6px">Coming Soon</div>
      <div class="text-sm text-muted">Shift briefing notes will appear here.</div>
    </div>
  </div>
</div>
</div>

<script>
  // Highlight active sidebar link
  (function() {
    const page = location.pathname.split('/').pop() || 'index.html';
    const map = {
      'index.html': 'snav-home',
      '': 'snav-home',
      'dashboard.html': 'snav-dashboard',
      'briefing.html': 'snav-briefing',
      'lead.html': 'snav-lead',
      'supervisor.html': 'snav-supervisor',
      'tasks.html': 'snav-home',
      'pin.html': 'snav-home',
    };
    const activeId = map[page];
    if (activeId) {
      const el = document.getElementById(activeId);
      if (el) el.classList.add('active');
    }
  })();
</script>

<script>
  document.getElementById('briefDateLabel').textContent =
    new Date().toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });
</script>
<script src="sidebar.js"></script>
</body>
</html>
