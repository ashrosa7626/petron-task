<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks – Petron Tasks</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Flag alerts ───────────────────────────────── */
    .flag-alert { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.35); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; animation: alert-in 0.3s ease; }
    @keyframes alert-in { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .flag-alert__header { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .flag-icon { width:28px; height:28px; border-radius:50%; background:rgba(239,68,68,0.15); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:0.9rem; }
    .flag-alert__title { font-weight:700; font-size:0.92rem; color:var(--danger); flex:1; }
    .flag-alert__reason { font-size:0.84rem; color:var(--text); background:rgba(239,68,68,0.05); border-radius:var(--radius-sm); padding:8px 10px; margin-bottom:10px; border-left:2px solid var(--danger); }
    .flag-alert__task { font-size:0.78rem; color:var(--muted); margin-bottom:10px; }

    /* ── Category accordion ────────────────────────── */
    .cat-block { margin-bottom: 12px; }

    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .cat-header:hover { border-color: var(--accent); background: var(--surface2); }
    .cat-header--open { border-radius: var(--radius) var(--radius) 0 0; border-bottom-color: transparent; }

    .cat-header__left { display: flex; align-items: center; gap: 10px; }
    .cat-header__name { font-weight: 700; font-size: 0.97rem; }
    .cat-header__count { font-size: 0.75rem; font-family: var(--mono); padding: 2px 8px; border-radius: 99px; background: rgba(79,138,255,0.1); color: var(--accent); }
    .cat-header__count--done { background: rgba(34,197,94,0.12); color: var(--success); }
    .cat-chevron { font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; }
    .cat-chevron--open { transform: rotate(180deg); }

    .cat-body {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
    }
    .cat-body--open { display: block; }

    /* ── Subcategory ───────────────────────────────── */
    .subcat-block { border-bottom: 1px solid var(--border); }
    .subcat-block:last-child { border-bottom: none; }

    .subcat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface2);
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .subcat-header:hover { background: var(--surface); }
    .subcat-header__name { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
    .subcat-header__right { display: flex; align-items: center; gap: 8px; }
    .subcat-count { font-size: 0.72rem; font-family: var(--mono); color: var(--muted); }
    .subcat-chevron { font-size: 0.65rem; color: var(--muted); transition: transform 0.2s; }
    .subcat-chevron--open { transform: rotate(180deg); }

    .subcat-body { display: none; }
    .subcat-body--open { display: block; }

    /* ── Task items inside accordion ───────────────── */
    .task-item { border-radius: 0; border-left: none; border-right: none; border-top: none; margin-bottom: 0; }
    .task-item:last-child { border-bottom: none; }
    .task-item--flagged { background: rgba(239,68,68,0.04); }
    .task-item--flagged .task-item__name { color: var(--danger); }

    /* Ad-hoc section at bottom */
    .adhoc-group { border-top: 1px solid var(--border); }
    .adhoc-group-header { padding: 10px 16px; background: var(--surface2); }
    .adhoc-group-title { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--accent2); }
  </style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="index.html" class="btn btn--ghost btn--sm">← Done</a>
    <div class="topbar__logo">Petron<span> Tasks</span></div>
    <div class="text-sm text-muted" id="clock"></div>
  </div>

  <div class="content">
    <div style="margin-bottom:20px">
      <div style="font-size:1.3rem;font-weight:700" id="greeting">Hi 👋</div>
      <div class="text-muted text-sm" id="dateLabel"></div>
    </div>

    <div id="flagAlerts"></div>

    <div class="card" style="margin-bottom:20px">
      <div class="flex flex--between" style="margin-bottom:8px">
        <span class="text-sm" style="font-weight:600">Today's Progress</span>
        <span class="text-sm text-muted" id="progressLabel">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar__fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="section-title">Your Tasks</div>
    <div id="taskList"><div class="empty-state">Loading tasks...</div></div>
  </div>
</div>

<!-- Photo Modal -->
<div class="modal-overlay" id="photoModal">
  <div class="modal">
    <div class="modal__title" id="photoModalTitle">Upload Photo</div>
    <p class="text-sm text-muted" style="margin-bottom:16px">This task requires a photo to be completed.</p>
    <div class="photo-zone" onclick="document.getElementById('photoInput').click()">
      <div class="photo-zone__icon">📷</div>
      <div class="photo-zone__label">Tap to take a photo or choose from gallery</div>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
    <img id="photoPreview" class="photo-preview" alt="Preview">
    <div class="modal__actions">
      <button class="btn btn--ghost" onclick="closePhotoModal()">Cancel</button>
      <button class="btn btn--success" id="confirmPhotoBtn" onclick="confirmPhoto()" disabled>Mark Complete</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  const staffId   = sessionStorage.getItem('staff_id');
  const staffName = sessionStorage.getItem('staff_name');
  if (!staffId) window.location.href = 'index.html';

  document.getElementById('greeting').textContent = `Hi, ${staffName} 👋`;
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  updateClock(); setInterval(updateClock, 1000);

  let tasks = [];
  let currentAssignmentId = null;
  let selectedFile = null;

  async function loadTasks() {
    const { data, error } = await db
      .from('daily_assignments')
      .select(`
        id, is_adhoc, custom_task_name,
        task_templates(
          name, description, photo_required, has_note,
          category_id, subcategory_id, sort_order,
          categories(id, name, sort_order),
          subcategories(id, name, sort_order)
        ),
        completions(id, completed_at, signoff_status,
          sign_offs(notes, signed_at)
        )
      `)
      .eq('date', today())
      .eq('staff_id', staffId);

    if (error) {
      document.getElementById('taskList').innerHTML = '<div class="empty-state">Error loading tasks.</div>';
      return;
    }

    tasks = (data || []).map(a => {
      const completion = a.completions?.[0] || null;
      const signoff    = completion?.sign_offs?.[0] || null;
      const tpl        = a.task_templates;
      return {
        id: a.id,
        name: a.is_adhoc ? a.custom_task_name : (tpl?.name || 'Unnamed Task'),
        description: tpl?.description || '',
        photo_required: tpl?.photo_required || false,
        has_note: tpl?.has_note || false,
        is_adhoc: a.is_adhoc,
        category_id:    tpl?.category_id || null,
        category_name:  tpl?.categories?.name || null,
        category_order: tpl?.categories?.sort_order || 99,
        subcat_id:      tpl?.subcategory_id || null,
        subcat_name:    tpl?.subcategories?.name || null,
        subcat_order:   tpl?.subcategories?.sort_order || 99,
        sort_order:     tpl?.sort_order || 99,
        done: !!completion,
        completed_at: completion?.completed_at || null,
        signoff_status: completion?.signoff_status || null,
        flag_reason: signoff?.notes || null,
        completion_id: completion?.id || null,
      };
    });

    renderFlagAlerts();
    renderTasks();
  }

  function renderFlagAlerts() {
    const flagged = tasks.filter(t => t.signoff_status === 'flagged');
    const container = document.getElementById('flagAlerts');
    if (flagged.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = flagged.map(t => `
      <div class="flag-alert">
        <div class="flag-alert__header">
          <div class="flag-icon">⚠️</div>
          <div class="flag-alert__title">Task flagged by supervisor</div>
        </div>
        <div class="flag-alert__task">${t.name}</div>
        ${t.flag_reason
          ? `<div class="flag-alert__reason">"${t.flag_reason}"</div>`
          : '<div class="flag-alert__reason">No reason provided — check with your supervisor.</div>'}
        <button class="btn btn--danger btn--sm btn--full" onclick="redoTask('${t.id}')">Redo this task</button>
      </div>
    `).join('');
  }

  function renderTasks() {
    const list  = document.getElementById('taskList');
    const done  = tasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
    const total = tasks.length;

    document.getElementById('progressLabel').textContent = `${done} / ${total}`;
    document.getElementById('progressFill').style.width = total ? `${(done/total)*100}%` : '0%';

    if (tasks.length === 0) {
      list.innerHTML = '<div class="empty-state">No tasks assigned for today.</div>';
      return;
    }

    // Separate categorised vs ad-hoc
    const categorised = tasks.filter(t => !t.is_adhoc && t.category_id);
    const adhoc       = tasks.filter(t => t.is_adhoc || !t.category_id);

    // Group by category → subcategory
    const catMap = {};
    for (const t of categorised) {
      const cid = t.category_id;
      if (!catMap[cid]) catMap[cid] = { name: t.category_name, order: t.category_order, subcats: {} };
      const sid = t.subcat_id || '__none__';
      if (!catMap[cid].subcats[sid]) catMap[cid].subcats[sid] = { name: t.subcat_name, order: t.subcat_order, tasks: [] };
      catMap[cid].subcats[sid].tasks.push(t);
    }

    // Sort categories and subcategories
    const sortedCats = Object.entries(catMap).sort((a,b) => a[1].order - b[1].order);

    let html = '';

    for (const [cid, cat] of sortedCats) {
      const allCatTasks = Object.values(cat.subcats).flatMap(s => s.tasks);
      const catDone     = allCatTasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
      const catTotal    = allCatTasks.length;
      const allDone     = catDone === catTotal && catTotal > 0;
      const hasFlagged  = allCatTasks.some(t => t.signoff_status === 'flagged');

      const countClass  = allDone ? 'cat-header__count--done' : 'cat-header__count';
      const countLabel  = `${catDone}/${catTotal}`;

      const sortedSubcats = Object.entries(cat.subcats).sort((a,b) => a[1].order - b[1].order);

      let subcatHtml = '';
      for (const [sid, subcat] of sortedSubcats) {
        const sortedTasks = [...subcat.tasks].sort((a,b) => a.sort_order - b.sort_order);
        const subDone  = sortedTasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
        const subTotal = sortedTasks.length;

        const taskRowsHtml = sortedTasks.map(t => taskRowHtml(t)).join('');

        if (sid === '__none__') {
          subcatHtml += taskRowsHtml;
        } else {
          subcatHtml += `
            <div class="subcat-block">
              <div class="subcat-header" onclick="toggleSubcat('sc-${sid}', this)">
                <div class="subcat-header__name">${subcat.name || ''}</div>
                <div class="subcat-header__right">
                  <span class="subcat-count">${subDone}/${subTotal}</span>
                  <span class="subcat-chevron" id="sc-chev-${sid}">▼</span>
                </div>
              </div>
              <div class="subcat-body" id="sc-${sid}">${taskRowsHtml}</div>
            </div>`;
        }
      }

      html += `
        <div class="cat-block">
          <div class="cat-header" onclick="toggleCat('cat-${cid}', 'cat-chev-${cid}', this)" id="cat-hdr-${cid}">
            <div class="cat-header__left">
              <span class="cat-header__name">${cat.name}</span>
              ${hasFlagged ? '<span style="color:var(--danger);font-size:0.8rem">⚠</span>' : ''}
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="${countClass}">${countLabel}</span>
              <span class="cat-chevron" id="cat-chev-${cid}">▼</span>
            </div>
          </div>
          <div class="cat-body" id="cat-${cid}">${subcatHtml}</div>
        </div>`;
    }

    // Ad-hoc tasks at the bottom
    if (adhoc.length > 0) {
      const adhocRows = adhoc.map(t => taskRowHtml(t)).join('');
      html += `
        <div class="cat-block">
          <div class="cat-header" onclick="toggleCat('cat-adhoc','cat-chev-adhoc',this)">
            <div class="cat-header__left">
              <span class="cat-header__name">Ad-hoc Tasks</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="cat-header__count">${adhoc.filter(t=>t.done && t.signoff_status!=='flagged').length}/${adhoc.length}</span>
              <span class="cat-chevron" id="cat-chev-adhoc">▼</span>
            </div>
          </div>
          <div class="cat-body" id="cat-adhoc">${adhocRows}</div>
        </div>`;
    }

    list.innerHTML = html;

    // Auto-open categories that have flagged tasks
    for (const [cid, cat] of sortedCats) {
      const allCatTasks = Object.values(cat.subcats).flatMap(s => s.tasks);
      if (allCatTasks.some(t => t.signoff_status === 'flagged')) {
        openCat('cat-' + cid, 'cat-chev-' + cid, document.getElementById('cat-hdr-' + cid));
      }
    }
  }

  function taskRowHtml(t) {
    const isFlagged  = t.signoff_status === 'flagged';
    const isApproved = t.signoff_status === 'approved';
    const canComplete = !t.done || isFlagged;

    const statusBadge = isFlagged
      ? '<span class="badge" style="background:rgba(239,68,68,0.1);color:var(--danger)">⚠ Flagged</span>'
      : isApproved
        ? '<span class="badge badge--done">✓ Approved</span>'
        : t.done
          ? `<span class="badge badge--done">✓ ${formatTime(t.completed_at)}</span>`
          : '<span class="badge badge--pending">Pending</span>';

    const noteBadge = t.has_note
      ? '<span class="badge badge--photo" style="background:rgba(245,158,11,0.1);color:var(--warning)">📝 Note</span>'
      : '';

    return `
      <div class="task-item ${t.done && !isFlagged ? 'task-item--done' : ''} ${isFlagged ? 'task-item--flagged' : ''}">
        <div class="task-check ${t.done && !isFlagged ? 'task-check--done' : ''}"
             onclick="${canComplete ? `completeTask('${t.id}')` : ''}"
             style="${!canComplete ? 'cursor:default' : ''}">
          ${t.done && !isFlagged
            ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
            : isFlagged ? '<span style="color:var(--danger);font-size:0.8rem">↺</span>' : ''}
        </div>
        <div class="task-item__body">
          <div class="task-item__name">${t.name}</div>
          <div class="task-item__meta">
            ${t.description ? `<span>${t.description}</span>` : ''}
            ${t.photo_required ? '<span class="badge badge--photo">📷 Photo</span>' : ''}
            ${noteBadge}
            ${statusBadge}
          </div>
        </div>
      </div>`;
  }

  function toggleCat(bodyId, chevId, headerEl) {
    const body = document.getElementById(bodyId);
    const chev = document.getElementById(chevId);
    const isOpen = body.classList.contains('cat-body--open');
    if (isOpen) {
      body.classList.remove('cat-body--open');
      chev.classList.remove('cat-chevron--open');
      headerEl.classList.remove('cat-header--open');
    } else {
      openCat(bodyId, chevId, headerEl);
    }
  }

  function openCat(bodyId, chevId, headerEl) {
    document.getElementById(bodyId)?.classList.add('cat-body--open');
    document.getElementById(chevId)?.classList.add('cat-chevron--open');
    headerEl?.classList.add('cat-header--open');
  }

  function toggleSubcat(bodyId, headerEl) {
    const body = document.getElementById(bodyId);
    const chevId = 'sc-chev-' + bodyId.replace('sc-', '');
    const chev = document.getElementById(chevId);
    const isOpen = body.classList.contains('subcat-body--open');
    body.classList.toggle('subcat-body--open', !isOpen);
    chev?.classList.toggle('subcat-chevron--open', !isOpen);
  }

  async function redoTask(assignmentId) {
    const task = tasks.find(t => t.id === assignmentId);
    if (!task) return;
    if (task.completion_id) await db.from('completions').delete().eq('id', task.completion_id);
    task.done = false; task.signoff_status = null; task.flag_reason = null;
    task.completion_id = null; task.completed_at = null;
    renderFlagAlerts(); renderTasks();
    showToast('Task reset — please complete it again.');
  }

  function completeTask(assignmentId) {
    const task = tasks.find(t => t.id === assignmentId);
    if (!task) return;
    if (task.done && task.signoff_status !== 'flagged') return;
    currentAssignmentId = assignmentId;
    if (task.photo_required) {
      document.getElementById('photoModalTitle').textContent = `📷 ${task.name}`;
      document.getElementById('photoModal').classList.add('modal-overlay--open');
      selectedFile = null;
      document.getElementById('photoPreview').style.display = 'none';
      document.getElementById('confirmPhotoBtn').disabled = true;
    } else {
      markComplete(assignmentId, null);
    }
  }

  async function markComplete(assignmentId, photoUrl) {
    const { error } = await db.from('completions').insert({
      assignment_id: assignmentId,
      staff_id: staffId,
      completed_at: new Date().toISOString(),
      photo_url: photoUrl || null,
    });
    if (error) { showToast('Error saving. Try again.', 'error'); return; }
    const task = tasks.find(t => t.id === assignmentId);
    if (task) { task.done = true; task.completed_at = new Date().toISOString(); task.signoff_status = 'pending'; }
    closePhotoModal();
    renderFlagAlerts(); renderTasks();
    showToast('Task marked complete!');
    const allDone = tasks.every(t => t.done && t.signoff_status !== 'flagged');
    if (allDone) { showToast('All tasks complete! Great work 🎉'); setTimeout(() => window.location.href = 'index.html', 2500); }
  }

  document.getElementById('photoInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = document.getElementById('photoPreview');
      img.src = ev.target.result; img.style.display = 'block';
    };
    reader.readAsDataURL(file);
    document.getElementById('confirmPhotoBtn').disabled = false;
  });

  async function confirmPhoto() {
    if (!selectedFile || !currentAssignmentId) return;
    const btn = document.getElementById('confirmPhotoBtn');
    setLoading(btn, true);
    const ext  = selectedFile.name.split('.').pop();
    const path = `completions/${currentAssignmentId}_${Date.now()}.${ext}`;
    const { error: uploadError } = await db.storage.from('task-photos').upload(path, selectedFile);
    if (uploadError) { showToast('Photo upload failed.', 'error'); setLoading(btn, false); return; }
    const { data: urlData } = db.storage.from('task-photos').getPublicUrl(path);
    await markComplete(currentAssignmentId, urlData?.publicUrl || path);
    setLoading(btn, false);
  }

  function closePhotoModal() {
    document.getElementById('photoModal').classList.remove('modal-overlay--open');
    currentAssignmentId = null; selectedFile = null;
  }

  loadTasks();
</script>
</body>
</html>
