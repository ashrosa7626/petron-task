<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks – Petron Tasks v4</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Flag alerts ──────────────────────────── */
    .flag-alert { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.35); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; animation:alert-in 0.3s ease; }
    @keyframes alert-in { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .flag-alert__header { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .flag-icon { width:28px;height:28px;border-radius:50%;background:rgba(239,68,68,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.9rem; }
    .flag-alert__title { font-weight:700;font-size:0.92rem;color:var(--danger);flex:1; }
    .flag-alert__reason { font-size:0.84rem;color:var(--text);background:rgba(239,68,68,0.05);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:10px;border-left:2px solid var(--danger); }
    .flag-alert__task { font-size:0.78rem;color:var(--muted);margin-bottom:10px; }

    /* ── Category (Level 1) ───────────────────── */
    .ac-cat { margin-bottom:10px; }
    .ac-cat-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px; background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); cursor:pointer; user-select:none;
      transition:border-color 0.15s, background 0.15s;
    }
    .ac-cat-header:hover { border-color:var(--accent); background:var(--surface2); }
    .ac-cat-header.open { border-radius:var(--radius) var(--radius) 0 0; border-bottom-color:transparent; }
    .ac-cat-name { font-weight:700; font-size:1rem; }
    .ac-cat-body { display:none; border:1px solid var(--border); border-top:none; border-radius:0 0 var(--radius) var(--radius); overflow:hidden; }
    .ac-cat-body.open { display:block; }

    /* ── Subcategory (Level 2) ────────────────── */
    .ac-sub { border-bottom:1px solid var(--border); }
    .ac-sub:last-child { border-bottom:none; }
    .ac-sub-header { display:flex;align-items:center;justify-content:space-between; padding:10px 16px; background:var(--surface2); cursor:pointer; user-select:none; transition:background 0.1s; }
    .ac-sub-header:hover { background:var(--surface); }
    .ac-sub-name { font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted); }
    .ac-sub-body { display:none; }
    .ac-sub-body.open { display:block; }

    /* ── Subgroup (Level 3) ───────────────────── */
    .ac-grp { border-bottom:1px solid var(--border); }
    .ac-grp:last-child { border-bottom:none; }
    .ac-grp-header { display:flex;align-items:center;justify-content:space-between; padding:9px 20px; background:rgba(79,138,255,0.04); cursor:pointer; user-select:none; border-left:2px solid var(--accent); }
    .ac-grp-header:hover { background:rgba(79,138,255,0.08); }
    .ac-grp-name { font-size:0.82rem;font-weight:600;color:var(--accent); }
    .ac-grp-body { display:none; }
    .ac-grp-body.open { display:block; }

    /* ── Chevron ──────────────────────────────── */
    .ac-chev { font-size:0.7rem;color:var(--muted);transition:transform 0.2s; }
    .ac-chev.open { transform:rotate(180deg); }

    /* ── Count pill ───────────────────────────── */
    .count-pill { font-size:0.72rem;font-family:var(--mono);padding:2px 8px;border-radius:99px;background:rgba(79,138,255,0.1);color:var(--accent);margin-right:4px; }
    .count-pill.done { background:rgba(34,197,94,0.12);color:var(--success); }

    /* ── Task rows ────────────────────────────── */
    .task-item { border-radius:0;border-left:none;border-right:none;border-top:none;margin-bottom:0; }
    .task-item:last-child { border-bottom:none; }
    .task-item--flagged { background:rgba(239,68,68,0.04); }
    .task-item--flagged .task-item__name { color:var(--danger); }
  </style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <a href="index.html" class="btn btn--ghost btn--sm">← Done</a>
    <div class="topbar__logo">Petron<span> Tasks</span></div>
    <div class="text-sm text-muted" id="clock"></div>
  </div>

  <div class="content">
    <div style="margin-bottom:20px">
      <div style="font-size:1.3rem;font-weight:700" id="greeting">Hi 👋</div>
      <div class="text-muted text-sm" id="dateLabel"></div>
    </div>

    <div id="flagAlerts"></div>

    <div class="card" style="margin-bottom:20px">
      <div class="flex flex--between" style="margin-bottom:8px">
        <span class="text-sm" style="font-weight:600">Today's Progress</span>
        <span class="text-sm text-muted" id="progressLabel">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar__fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="section-title">Your Tasks</div>
    <div id="taskList"><div class="empty-state">Loading tasks...</div></div>
  </div>
</div>

<!-- Photo Modal -->
<div class="modal-overlay" id="photoModal">
  <div class="modal">
    <div class="modal__title" id="photoModalTitle">Upload Photo</div>
    <p class="text-sm text-muted" style="margin-bottom:16px">This task requires a photo to be completed.</p>
    <div class="photo-zone" onclick="document.getElementById('photoInput').click()">
      <div class="photo-zone__icon">📷</div>
      <div class="photo-zone__label">Tap to take a photo or choose from gallery</div>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
    <img id="photoPreview" class="photo-preview" alt="Preview">
    <div class="modal__actions">
      <button class="btn btn--ghost" onclick="closePhotoModal()">Cancel</button>
      <button class="btn btn--success" id="confirmPhotoBtn" onclick="confirmPhoto()" disabled>Mark Complete</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
  const staffId   = sessionStorage.getItem('staff_id');
  const staffName = sessionStorage.getItem('staff_name');
  if (!staffId) window.location.href = 'index.html';

  document.getElementById('greeting').textContent = `Hi, ${staffName} 👋`;
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });

  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }
  updateClock(); setInterval(updateClock, 1000);

  let tasks = [];
  let currentAssignmentId = null;
  let selectedFile = null;

  async function loadTasks() {
    const { data, error } = await db
      .from('daily_assignments')
      .select(`
        id, is_adhoc, custom_task_name,
        task_templates(
          name, description, photo_required, has_note, sort_order,
          category_id, subcategory_id, subgroup_id,
          categories(id, name, sort_order),
          subcategories(id, name, sort_order),
          subgroups(id, name, sort_order)
        ),
        completions(id, completed_at, signoff_status,
          sign_offs(notes)
        )
      `)
      .eq('date', today())
      .eq('staff_id', staffId);

    if (error) {
      document.getElementById('taskList').innerHTML = '<div class="empty-state">Error loading tasks.</div>';
      return;
    }

    tasks = (data || []).map(a => {
      const c   = a.completions?.[0] || null;
      const so  = c?.sign_offs?.[0]  || null;
      const tpl = a.task_templates;
      const raw = a.custom_task_name || '';
      const isStock = a.is_adhoc && raw.startsWith('TOPUP:');

      let name, cat_id, cat_name, cat_order, sub_id, sub_name, sub_order, grp_id, grp_name, is_adhoc;

      if (isStock) {
        // Parse: TOPUP:{subName}:{section}:{itemName}
        const parts       = raw.split(':');
        const subName     = parts[1] || 'Stocks';
        const sectionLabel = parts[2] || subName;
        name       = parts.slice(3).join(':') || raw;
        cat_id     = '__stock_cat__';
        cat_name   = 'Stocks & Merchandise (Top-up)';
        cat_order  = 2;
        sub_id     = '__stock_' + subName + '__';
        sub_name   = subName;
        sub_order  = 1;
        grp_id     = '__stock_grp_' + sectionLabel + '__';
        grp_name   = sectionLabel;
        is_adhoc   = false;
      } else {
        name       = a.is_adhoc ? raw : (tpl?.name || 'Unnamed Task');
        cat_id     = tpl?.category_id    || null;
        cat_name   = tpl?.categories?.name || null;
        cat_order  = tpl?.categories?.sort_order ?? 99;
        sub_id     = tpl?.subcategory_id || null;
        sub_name   = tpl?.subcategories?.name || null;
        sub_order  = tpl?.subcategories?.sort_order ?? 99;
        grp_id     = tpl?.subgroup_id    || null;
        grp_name   = tpl?.subgroups?.name || null;
        is_adhoc   = a.is_adhoc;
      }

      return {
        id:             a.id,
        name,
        description:    tpl?.description || '',
        photo_required: tpl?.photo_required || false,
        is_adhoc,
        cat_id, cat_name, cat_order,
        sub_id, sub_name, sub_order,
        grp_id,
        grp_name,
        grp_order:      99,
        task_order:     tpl?.sort_order ?? 99,
        done:           !!c,
        completed_at:   c?.completed_at    || null,
        signoff_status: c?.signoff_status  || null,
        flag_reason:    so?.notes          || null,
        completion_id:  c?.id              || null,
      };
    });

    renderFlagAlerts();
    renderTasks();
  }

  function renderFlagAlerts() {
    const flagged = tasks.filter(t => t.signoff_status === 'flagged');
    const el = document.getElementById('flagAlerts');
    if (!flagged.length) { el.innerHTML = ''; return; }
    el.innerHTML = flagged.map(t => `
      <div class="flag-alert">
        <div class="flag-alert__header">
          <div class="flag-icon">⚠️</div>
          <div class="flag-alert__title">Task flagged by supervisor</div>
        </div>
        <div class="flag-alert__task">${t.name}</div>
        ${t.flag_reason
          ? `<div class="flag-alert__reason">"${t.flag_reason}"</div>`
          : '<div class="flag-alert__reason">No reason given — check with your supervisor.</div>'}
        <button class="btn btn--danger btn--sm btn--full" onclick="redoTask('${t.id}')">Redo this task</button>
      </div>`).join('');
  }

  function pill(done, total) {
    const all = done === total && total > 0;
    return `<span class="count-pill ${all?'done':''}">${done}/${total}</span>`;
  }

  function renderTasks() {
    const list  = document.getElementById('taskList');
    const done  = tasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
    const total = tasks.length;
    document.getElementById('progressLabel').textContent = `${done} / ${total}`;
    document.getElementById('progressFill').style.width  = total ? `${(done/total)*100}%` : '0%';

    if (!tasks.length) { list.innerHTML = '<div class="empty-state">No tasks assigned for today.</div>'; return; }

    const categorised = tasks.filter(t => !t.is_adhoc && t.cat_id);
    const adhoc       = tasks.filter(t =>  t.is_adhoc || !t.cat_id);

    // Build cat → sub → grp → tasks
    const catMap = {};
    for (const t of categorised) {
      if (!catMap[t.cat_id]) catMap[t.cat_id] = { name:t.cat_name, order:t.cat_order, subs:{} };
      const sid = t.sub_id || '__none__';
      if (!catMap[t.cat_id].subs[sid]) catMap[t.cat_id].subs[sid] = { name:t.sub_name, order:t.sub_order, grps:{}, direct:[] };
      if (t.grp_id) {
        if (!catMap[t.cat_id].subs[sid].grps[t.grp_id]) catMap[t.cat_id].subs[sid].grps[t.grp_id] = { name:t.grp_name, order:t.grp_order, tasks:[] };
        catMap[t.cat_id].subs[sid].grps[t.grp_id].tasks.push(t);
      } else {
        catMap[t.cat_id].subs[sid].direct.push(t);
      }
    }

    let html = '';
    const sortedCats = Object.entries(catMap).sort((a,b) => a[1].order - b[1].order);

    for (const [cid, cat] of sortedCats) {
      const allCatTasks = Object.values(cat.subs).flatMap(s =>
        [...s.direct, ...Object.values(s.grps).flatMap(g => g.tasks)]
      );
      const catDone    = allCatTasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
      const hasFlagged = allCatTasks.some(t => t.signoff_status === 'flagged');
      const autoOpen   = hasFlagged;

      let subcatHtml = '';
      const sortedSubs = Object.entries(cat.subs).sort((a,b) => a[1].order - b[1].order);

      for (const [sid, sub] of sortedSubs) {
        const allSubTasks = [...sub.direct, ...Object.values(sub.grps).flatMap(g => g.tasks)];
        const subDone = allSubTasks.filter(t => t.done && t.signoff_status !== 'flagged').length;

        let subContent = sub.direct.sort((a,b) => a.task_order - b.task_order).map(t => taskRow(t)).join('');

        const sortedGrps = Object.entries(sub.grps).sort((a,b) => a[1].order - b[1].order);
        for (const [gid, grp] of sortedGrps) {
          const grpDone = grp.tasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
          const rows    = grp.tasks.sort((a,b) => a.task_order - b.task_order).map(t => taskRow(t)).join('');
          subContent += `
            <div class="ac-grp">
              <div class="ac-grp-header" onclick="tog('ag-${gid}','agc-${gid}')">
                <span class="ac-grp-name">${grp.name}</span>
                <div style="display:flex;align-items:center">
                  ${pill(grpDone, grp.tasks.length)}
                  <span class="ac-chev" id="agc-${gid}">▼</span>
                </div>
              </div>
              <div class="ac-grp-body" id="ag-${gid}">${rows}</div>
            </div>`;
        }

        if (sid === '__none__') {
          subcatHtml += subContent;
        } else {
          subcatHtml += `
            <div class="ac-sub">
              <div class="ac-sub-header" onclick="tog('as-${sid}','asc-${sid}')">
                <span class="ac-sub-name">${sub.name || ''}</span>
                <div style="display:flex;align-items:center">
                  ${pill(subDone, allSubTasks.length)}
                  <span class="ac-chev" id="asc-${sid}">▼</span>
                </div>
              </div>
              <div class="ac-sub-body" id="as-${sid}">${subContent}</div>
            </div>`;
        }
      }

      html += `
        <div class="ac-cat">
          <div class="ac-cat-header ${autoOpen?'open':''}" id="ach-${cid}" onclick="togCat('acb-${cid}','ach-${cid}','acc-${cid}')">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="ac-cat-name">${cat.name}</span>
              ${hasFlagged ? '<span style="color:var(--danger);font-size:0.85rem">⚠</span>' : ''}
            </div>
            <div style="display:flex;align-items:center">
              ${pill(catDone, allCatTasks.length)}
              <span class="ac-chev ${autoOpen?'open':''}" id="acc-${cid}">▼</span>
            </div>
          </div>
          <div class="ac-cat-body ${autoOpen?'open':''}" id="acb-${cid}">${subcatHtml}</div>
        </div>`;
    }

    // Ad-hoc tasks
    if (adhoc.length) {
      const adhocDone = adhoc.filter(t => t.done && t.signoff_status !== 'flagged').length;
      const rows = adhoc.map(t => taskRow(t)).join('');
      html += `
        <div class="ac-cat">
          <div class="ac-cat-header" id="ach-adhoc" onclick="togCat('acb-adhoc','ach-adhoc','acc-adhoc')">
            <span class="ac-cat-name">Ad-hoc Tasks</span>
            <div style="display:flex;align-items:center">
              ${pill(adhocDone, adhoc.length)}
              <span class="ac-chev" id="acc-adhoc">▼</span>
            </div>
          </div>
          <div class="ac-cat-body" id="acb-adhoc">${rows}</div>
        </div>`;
    }

    list.innerHTML = html;
  }

  function taskRow(t) {
    const isFlagged  = t.signoff_status === 'flagged';
    const isApproved = t.signoff_status === 'approved';
    const canDo = !t.done || isFlagged;

    const status = isFlagged
      ? '<span class="badge" style="background:rgba(239,68,68,0.1);color:var(--danger)">⚠ Flagged</span>'
      : isApproved
        ? '<span class="badge badge--done">✓ Approved</span>'
        : t.done
          ? `<span class="badge badge--done">✓ ${formatTime(t.completed_at)}</span>`
          : '<span class="badge badge--pending">Pending</span>';

    return `
      <div class="task-item ${t.done&&!isFlagged?'task-item--done':''} ${isFlagged?'task-item--flagged':''}">
        <div class="task-check ${t.done&&!isFlagged?'task-check--done':''}"
             onclick="${canDo?`completeTask('${t.id}')`:'null'}"
             style="${!canDo?'cursor:default':''}">
          ${t.done&&!isFlagged
            ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
            : isFlagged ? '<span style="color:var(--danger);font-size:0.8rem">↺</span>' : ''}
        </div>
        <div class="task-item__body">
          <div class="task-item__name">${t.name}</div>
          <div class="task-item__meta">
            ${t.photo_required ? '<span class="badge badge--photo">📷 Photo</span>' : ''}
            ${status}
          </div>
        </div>
      </div>`;
  }

  function tog(bodyId, chevId) {
    document.getElementById(bodyId)?.classList.toggle('open');
    document.getElementById(chevId)?.classList.toggle('open');
  }

  function togCat(bodyId, headerId, chevId) {
    const opening = !document.getElementById(bodyId)?.classList.contains('open');
    document.getElementById(bodyId)?.classList.toggle('open', opening);
    document.getElementById(headerId)?.classList.toggle('open', opening);
    document.getElementById(chevId)?.classList.toggle('open', opening);
  }

  async function redoTask(assignmentId) {
    const t = tasks.find(x => x.id === assignmentId);
    if (!t) return;
    if (t.completion_id) await db.from('completions').delete().eq('id', t.completion_id);
    t.done=false; t.signoff_status=null; t.flag_reason=null; t.completion_id=null; t.completed_at=null;
    renderFlagAlerts();
    updateTaskRowInPlace(assignmentId);
    updateAllCountPills();
    updateProgressBar();
    showToast('Task reset — please complete it again.');
  }

  function completeTask(assignmentId) {
    const t = tasks.find(x => x.id === assignmentId);
    if (!t || (t.done && t.signoff_status !== 'flagged')) return;
    currentAssignmentId = assignmentId;
    if (t.photo_required) {
      document.getElementById('photoModalTitle').textContent = `📷 ${t.name}`;
      document.getElementById('photoModal').classList.add('modal-overlay--open');
      selectedFile = null;
      document.getElementById('photoPreview').style.display = 'none';
      document.getElementById('confirmPhotoBtn').disabled = true;
    } else {
      markComplete(assignmentId, null);
    }
  }

  async function markComplete(assignmentId, photoUrl) {
    const { error } = await db.from('completions').insert({
      assignment_id: assignmentId, staff_id: staffId,
      completed_at:  new Date().toISOString(), photo_url: photoUrl || null,
    });
    if (error) { showToast('Error saving. Try again.', 'error'); return; }
    const t = tasks.find(x => x.id === assignmentId);
    if (t) { t.done=true; t.completed_at=new Date().toISOString(); t.signoff_status='pending'; }
    closePhotoModal();

    // Update just this task row in place — no full re-render
    updateTaskRowInPlace(assignmentId);
    updateAllCountPills();
    updateProgressBar();
    renderFlagAlerts();

    showToast('Task marked complete!');
    if (tasks.every(t => t.done && t.signoff_status !== 'flagged')) {
      showToast('All tasks complete! Great work 🎉');
      setTimeout(() => window.location.href = 'index.html', 2500);
    }
  }

  function updateTaskRowInPlace(assignmentId) {
    const t = tasks.find(x => x.id === assignmentId);
    if (!t) return;
    // Find the task-item div — it has the task-check inside with onclick containing the id
    const allItems = document.querySelectorAll('.task-item');
    for (const item of allItems) {
      const check = item.querySelector('.task-check');
      if (check && check.getAttribute('onclick')?.includes(assignmentId)) {
        // Replace this item with updated version
        const newItem = document.createElement('div');
        newItem.innerHTML = taskRow(t);
        item.replaceWith(newItem.firstElementChild);
        break;
      }
    }
  }

  function updateAllCountPills() {
    // Update count pills for all categories and subcategories
    const list = document.getElementById('taskList');
    if (!list) return;

    // Re-calculate counts per category
    const categorised = tasks.filter(t => !t.is_adhoc && t.cat_id);
    const catMap = {};
    for (const t of categorised) {
      if (!catMap[t.cat_id]) catMap[t.cat_id] = [];
      catMap[t.cat_id].push(t);
    }

    // Update each category pill
    for (const [cid, catTasks] of Object.entries(catMap)) {
      const done  = catTasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
      const total = catTasks.length;
      const all   = done === total && total > 0;
      const pillEl = document.querySelector(`#ach-${cid} .count-pill`);
      if (pillEl) {
        pillEl.textContent = `${done}/${total}`;
        pillEl.className = `count-pill${all?' done':''}`;
      }
    }

    // Update subcategory pills
    const subMap = {};
    for (const t of categorised) {
      if (!t.sub_id) continue;
      if (!subMap[t.sub_id]) subMap[t.sub_id] = [];
      subMap[t.sub_id].push(t);
    }
    for (const [sid, subTasks] of Object.entries(subMap)) {
      const done  = subTasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
      const total = subTasks.length;
      const all   = done === total && total > 0;
      const pillEl = document.querySelector(`#asc-${sid}`)?.previousElementSibling;
      if (pillEl) {
        pillEl.textContent = `${done}/${total}`;
        pillEl.className = `count-pill${all?' done':''}`;
      }
    }

    // Update subgroup pills
    const grpMap = {};
    for (const t of categorised) {
      if (!t.grp_id) continue;
      if (!grpMap[t.grp_id]) grpMap[t.grp_id] = [];
      grpMap[t.grp_id].push(t);
    }
    for (const [gid, grpTasks] of Object.entries(grpMap)) {
      const done  = grpTasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
      const total = grpTasks.length;
      const all   = done === total && total > 0;
      const pillEl = document.querySelector(`#agc-${gid}`)?.previousElementSibling;
      if (pillEl) {
        pillEl.textContent = `${done}/${total}`;
        pillEl.className = `count-pill${all?' done':''}`;
      }
    }
  }

  function updateProgressBar() {
    const done  = tasks.filter(t => t.done && t.signoff_status !== 'flagged').length;
    const total = tasks.length;
    document.getElementById('progressLabel').textContent = `${done} / ${total}`;
    document.getElementById('progressFill').style.width  = total ? `${(done/total)*100}%` : '0%';
  }

  document.getElementById('photoInput').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    selectedFile = file;
    const r = new FileReader();
    r.onload = ev => { const img=document.getElementById('photoPreview'); img.src=ev.target.result; img.style.display='block'; };
    r.readAsDataURL(file);
    document.getElementById('confirmPhotoBtn').disabled = false;
  });

  async function confirmPhoto() {
    if (!selectedFile || !currentAssignmentId) return;
    const btn = document.getElementById('confirmPhotoBtn');
    setLoading(btn, true);
    const ext  = selectedFile.name.split('.').pop();
    const path = `completions/${currentAssignmentId}_${Date.now()}.${ext}`;
    const { error: ue } = await db.storage.from('task-photos').upload(path, selectedFile);
    if (ue) { showToast('Photo upload failed.', 'error'); setLoading(btn, false); return; }
    const { data: ud } = db.storage.from('task-photos').getPublicUrl(path);
    await markComplete(currentAssignmentId, ud?.publicUrl || path);
    setLoading(btn, false);
  }

  function closePhotoModal() {
    document.getElementById('photoModal').classList.remove('modal-overlay--open');
    currentAssignmentId = null; selectedFile = null;
  }

  loadTasks();
</script>
</body>
</html>
